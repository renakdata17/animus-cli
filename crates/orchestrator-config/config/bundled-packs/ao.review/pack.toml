schema = "ao.pack.v1"
id = "ao.review"
version = "0.1.0"
kind = "domain-pack"
title = "AO Review"
description = "Bundled first-party review and QA workflows."

[ownership]
mode = "bundled"

[compatibility]
ao_core = ">=0.1.0"
workflow_schema = "v2"
subject_schema = "v2"

[subjects]
kinds = ["ao.task"]
default_kind = "ao.task"

[workflows]
root = "workflows"
exports = ["ao.review/cycle"]

[runtime]
agent_overlay = "runtime/agent-runtime.overlay.yaml"

[permissions]
tools = ["ao", "cargo"]

[native_module]
feature = "plugin_ao_review"
module_id = "ao.review"
optional = true
