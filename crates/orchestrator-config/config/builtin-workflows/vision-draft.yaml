tools_allowlist:
  - ao
  - Read
  - Glob
  - Grep
  - Bash
  - Write

phase_catalog:
  vision-draft:
    label: Vision Draft
    description: Draft a project vision document by analyzing the codebase and project context.
    category: planning
    tags: ["planning", "vision"]

agents:
  po:
    description: Product Owner agent for vision drafting
    system_prompt: You are a product owner responsible for drafting the project vision.

phases:
  vision-draft:
    mode: agent
    agent_id: po
    directive: |
      You are drafting a project vision document. Analyze the project's codebase, README,
      existing documentation, and any provided context to produce a comprehensive vision.

      Check whether a vision already exists by locating the generated planning artifacts
      for this repository (`vision.json` preferred, `product-vision.md` fallback).
      If a vision already exists, summarize it and ask whether to overwrite or refine instead.

      The vision should include:
      - A clear problem statement
      - Target users
      - Goals (3-6 concrete goals)
      - Constraints (technical, business, or regulatory)
      - Value proposition
      - Complexity assessment (simple/moderate/complex/enterprise)

      Use the dispatch_input JSON for any user-provided context (problem_statement, goals, etc.).
      Persist the final vision using the ao CLI commands available to you.

      Output a structured JSON summary of what was created.

workflows:
  - id: builtin/vision-draft
    name: Vision Draft
    description: Draft a project vision document by analyzing the codebase and context.
    phases:
      - vision-draft
