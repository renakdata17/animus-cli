tools_allowlist:
  - ao
  - Read
  - Glob
  - Grep
  - Bash

phase_catalog:
  vision-refine:
    label: Vision Refine
    description: Refine the existing project vision with targeted improvements.
    category: planning
    tags: ["planning", "vision"]

phases:
  vision-refine:
    mode: agent
    directive: |
      You are refining an existing project vision document.

      First, read the current vision using `ao vision get --json`.

      Then analyze the codebase and project state to identify improvements:
      - Are there missing target users?
      - Are goals too vague or missing?
      - Are constraints outdated or incomplete?
      - Does the complexity assessment match the actual project scope?

      If dispatch_input includes a "focus" field, prioritize that area.
      If dispatch_input includes "preserve_core": true, do not change the problem statement
      or value proposition — only add to goals, constraints, and target users.

      Apply refinements and persist using ao CLI commands.
      Output a structured JSON summary of what changed.

workflows:
  - id: builtin/vision-refine
    name: Vision Refine
    description: Refine the project vision with targeted improvements.
    phases:
      - vision-refine
