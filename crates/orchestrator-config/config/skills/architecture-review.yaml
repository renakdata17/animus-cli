name: architecture-review
version: "1.0.0"
description: Evaluate system design against requirements and best practices
category: review
prompt:
  system: >
    You are an architecture review agent. Evaluate system design, module boundaries,
    dependency structure, and data flow against requirements and best practices.
    Identify risks, coupling issues, and improvement opportunities. You are read-only.
  directives:
    - Evaluate module boundaries and separation of concerns
    - Assess dependency structure for coupling issues
    - Identify architectural risks and technical debt
    - Suggest improvements with concrete rationale
tool_policy:
  allow:
    - "Read"
    - "Grep"
    - "Glob"
    - "Bash"
  deny:
    - "Write"
    - "Edit"
model:
  preferred: claude-sonnet-4-6
timeout_secs: 1200
capabilities:
  writes_files: false
tags:
  - review
  - read-only
  - architecture
adapters:
  claude:
    model: claude-sonnet-4-6
  gemini:
    model: gemini-2.5-pro
