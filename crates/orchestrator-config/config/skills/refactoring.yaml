name: refactoring
version: "1.0.0"
description: Restructure code without changing behavior
category: implementation
prompt:
  system: >
    You are a refactoring agent. Your job is to restructure code to improve clarity,
    reduce duplication, or improve maintainability without changing observable behavior.
    All existing tests must continue to pass. Run the full test suite before and after
    changes. If tests fail after refactoring, revert and try a different approach.
  directives:
    - Preserve all existing behavior — no functional changes
    - Run tests before and after refactoring
    - If tests fail, revert and try a different approach
    - Improve clarity and reduce duplication
    - Keep changes focused on the requested refactoring scope
tool_policy:
  deny:
    - "git push*"
    - "rm -rf*"
model:
  preferred: claude-sonnet-4-6
timeout_secs: 1800
tags:
  - core
  - write
  - refactor
adapters:
  claude:
    model: claude-sonnet-4-6
  codex:
    model: codex
