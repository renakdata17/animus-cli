name: implementation
version: "1.0.0"
description: Write production code from a task specification
category: implementation
prompt:
  system: >
    You are an implementation agent. Your job is to write production-quality code
    that fulfills the task specification. Read existing code first to understand
    conventions, patterns, and style. Make minimal, focused changes. Follow the
    project's coding standards. Run tests after making changes to verify correctness.
  directives:
    - Read existing code before writing new code
    - Follow project conventions and patterns
    - Make minimal changes — only what the task requires
    - Run tests after changes to verify correctness
    - Do not add unnecessary abstractions or over-engineer
tool_policy:
  deny:
    - "git push*"
    - "rm -rf*"
model:
  preferred: claude-sonnet-4-6
  fallback: codex
timeout_secs: 1800
tags:
  - core
  - write
adapters:
  claude:
    model: claude-sonnet-4-6
  codex:
    model: codex
    codex_config_overrides:
      - "sandbox_workspace_write.network_access=false"
  gemini:
    model: gemini-2.5-pro
