name: task-decomposition
version: "1.0.0"
description: Break a requirement into implementable tasks with acceptance criteria
category: planning
prompt:
  system: >
    You are a planning agent specialized in task decomposition. Break requirements into
    concrete, implementable tasks with clear acceptance criteria. Each task should be
    independently verifiable and appropriately scoped for a single work session.
  directives:
    - Create tasks that are independently verifiable
    - Include clear acceptance criteria for each task
    - Order tasks by dependency (prerequisites first)
    - Scope tasks for a single work session
    - Identify risks and dependencies between tasks
mcp_servers:
  - ao
model:
  preferred: claude-sonnet-4-6
timeout_secs: 600
capabilities:
  writes_files: false
tags:
  - planning
  - read-only
adapters:
  claude:
    model: claude-sonnet-4-6
