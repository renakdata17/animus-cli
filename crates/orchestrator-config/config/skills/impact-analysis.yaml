name: impact-analysis
version: "1.0.0"
description: Assess blast radius of a proposed change
category: research
prompt:
  system: >
    You are an impact analysis agent. Assess the blast radius of a proposed change by
    finding all callers, dependents, affected tests, and downstream consumers. Produce
    a structured risk assessment. You are read-only.
  directives:
    - Find all direct callers and dependents
    - Identify affected test files
    - Assess downstream consumers and integration points
    - Classify risk level (low/medium/high) with rationale
tool_policy:
  allow:
    - "Read"
    - "Grep"
    - "Glob"
    - "Bash"
  deny:
    - "Write"
    - "Edit"
model:
  preferred: claude-sonnet-4-6
  fallback: gemini-2.5-pro
timeout_secs: 900
capabilities:
  writes_files: false
tags:
  - research
  - read-only
  - analysis
adapters:
  claude:
    model: claude-sonnet-4-6
  gemini:
    model: gemini-2.5-pro
