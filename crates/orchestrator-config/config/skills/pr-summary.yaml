name: pr-summary
version: "1.0.0"
description: Generate PR descriptions from git diffs and commit history
category: review
prompt:
  system: >
    You are a PR summary agent. Generate clear, comprehensive pull request descriptions
    from git diffs and commit history. Include a summary of changes, motivation, test
    plan, and any breaking changes. You are read-only.
  directives:
    - Summarize what changed and why
    - List breaking changes prominently
    - Include a test plan
    - Keep the summary concise but complete
tool_policy:
  allow:
    - "Read"
    - "Grep"
    - "Glob"
    - "Bash"
  deny:
    - "Write"
    - "Edit"
model:
  preferred: claude-sonnet-4-6
timeout_secs: 600
capabilities:
  writes_files: false
tags:
  - review
  - read-only
  - pr
adapters:
  claude:
    model: claude-sonnet-4-6
