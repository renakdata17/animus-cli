	task(id: ID!): GqlTask
	tasksPrioritized: [GqlTask!]!
	tasksNext: GqlTask
	taskStats: GqlTaskStats!
	requirements(status: String, priority: String, category: String, requirementType: String, tags: [String!], linkedTaskId: String, search: String, sort: String): [GqlRequirement!]!
	requirement(id: ID!): GqlRequirement
	workflows(status: String, workflowRef: String, taskId: String, phaseId: String, search: String, sort: String): [GqlWorkflow!]!
	workflow(id: ID!): GqlWorkflow
	tasksPaginated(status: String, taskType: String, priority: String, risk: String, assigneeType: String, tags: [String!], linkedRequirement: String, linkedArchitectureEntity: String, search: String, sort: String, limit: Int! = 50, offset: Int! = 0): GqlTaskConnection!
