	pauseWorkflow(id: ID!): GqlWorkflow!
	resumeWorkflow(id: ID!, feedback: String): GqlWorkflow!
	cancelWorkflow(id: ID!): GqlWorkflow!
	saveAgentProfile(name: String!, model: String, tool: String, role: String): Boolean!
	saveWorkflowConfig(configJson: String!): Boolean!
	upsertWorkflowDefinition(id: String!, name: String!, description: String, phases: String!, variables: String): Boolean!
	deleteWorkflowDefinition(id: ID!): Boolean!
	approvePhase(workflowId: ID!, phaseId: String!, note: String): GqlWorkflow!
	daemonStart: Boolean!
	daemonStop: Boolean!
	daemonPause: Boolean!
	daemonResume: Boolean!
	daemonClearLogs: Boolean!
	createProject(name: String!, path: String!, description: String, projectType: String): GqlProject!
	updateProject(id: ID!, name: String, description: String, projectType: String): GqlProject!
	deleteProject(id: ID!): Boolean!
