	workflowConfig: GqlWorkflowConfig!
	skills: [GqlSkill!]!
	skillDetail(name: String!): GqlSkillDetail
	daemonHealth: GqlDaemonHealth!
	daemonStatus: GqlDaemonStatus!
	daemonLogs(limit: Int): [GqlDaemonLog!]!
	agentRuns: [GqlAgentRun!]!
	projects: [GqlProject!]!
	project(id: ID!): GqlProject
	projectsActive: [GqlProject!]!
	vision: GqlVision
	queue: [GqlQueueEntry!]!
	queueStats: GqlQueueStats!
