query ReadyTasks($search: String, $limit: Int) {
  readyTasks(search: $search, limit: $limit) {
    id
    title
    statusRaw
    priorityRaw
    taskTypeRaw
  }
}

query WorkflowDefinitions {
  workflowDefinitions {
    id
    name
    description
    phases
  }
}

query DispatchRequirements {
  requirements {
    id
    title
    description
    priorityRaw
    statusRaw
    requirementType
    tags
    linkedTaskIds
    acceptanceCriteria
  }
}
