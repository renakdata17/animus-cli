mutation SaveAgentProfile($name: String!, $model: String, $tool: String, $role: String) {
  saveAgentProfile(name: $name, model: $model, tool: $tool, role: $role)
}

query WorkflowConfig {
  workflowConfig {
    mcpServers { name command args transport tools env { key value } }
    phaseCatalog { id label description category tags }
    tools { name executable supportsMcp supportsWrite contextWindow }
    agentProfiles { name description role mcpServers skills tool model }
    schedules { id cron workflowRef command enabled }
  }
}
