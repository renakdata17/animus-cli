name: Web UI CI

on:
  pull_request:
    paths:
      - "crates/orchestrator-web-server/**"
      - ".github/workflows/web-ui-ci.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/release-rollback-validation.yml"
      - ".github/release-checklists/web-gui-release.md"
  push:
    tags-ignore:
      - "*"
    paths:
      - "crates/orchestrator-web-server/**"
      - ".github/workflows/web-ui-ci.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/release-rollback-validation.yml"
      - ".github/release-checklists/web-gui-release.md"

permissions:
  contents: read

concurrency:
  group: web-ui-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-ui-matrix:
    name: web-ui-matrix (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node:
          - "20.x"
          - "22.x"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: crates/orchestrator-web-server/web-ui/package-lock.json

      - name: Install dependencies
        working-directory: crates/orchestrator-web-server/web-ui
        run: npm ci

      - name: Lint
        working-directory: crates/orchestrator-web-server/web-ui
        continue-on-error: true
        run: npm run lint

      - name: Typecheck
        working-directory: crates/orchestrator-web-server/web-ui
        continue-on-error: true
        run: npm run typecheck

      - name: Run unit/component tests
        working-directory: crates/orchestrator-web-server/web-ui
        run: npm run test

      - name: Build web UI bundle
        working-directory: crates/orchestrator-web-server/web-ui
        run: npm run build

  web-ui-smoke-e2e:
    name: web-ui-smoke-e2e
    runs-on: ubuntu-latest
    needs: web-ui-matrix
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: crates/orchestrator-web-server/web-ui/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: crates/orchestrator-web-server/web-ui
        run: npm ci

      - name: Run smoke E2E
        id: smoke
        working-directory: crates/orchestrator-web-server/web-ui
        env:
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/crates/orchestrator-web-server/web-ui/.smoke-artifacts
        run: npm run test:e2e:smoke

      - name: Upload smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-ui-smoke-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/crates/orchestrator-web-server/web-ui/.smoke-artifacts
          if-no-files-found: ignore
          retention-days: 7
