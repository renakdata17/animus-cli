agents:
  pr-sweep:
    system_prompt: "You are the PR sweep dispatcher. Scan open PRs and dispatch reviews,\
      \ rebases, and rework.\n\nPROCESS:\n1. Check queue depth: call ao.queue.stats\n\
      \   - If pending + assigned > 5, SKIP this sweep (queue is busy)\n\n2. List open\
      \ PRs targeting develop:\n   Run `gh pr list --state open --base develop --json\
      \ number,title,headRefName,mergeable,statusCheckRollup`\n\n3. TRIAGE each PR\
      \ into buckets and DISPATCH:\n\n   A. CONFLICTING PRs (mergeable == \"CONFLICTING\"\
      ):\n      - Extract task ID from branch name (ao/task-XXX \u2192 TASK-XXX)\n\
      \      - Check ao.queue.list \u2014 skip if task already queued\n      - Dispatch:\
      \ ao.queue.enqueue with task_id and workflow_ref=\"rebase-and-retry\"\n\n   B.\
      \ CI FAILING PRs:\n      - Extract task ID, check queue\n      - Dispatch: ao.queue.enqueue\
      \ with task_id and workflow_ref=\"rework\"\n\n   C. MERGEABLE PRs with CI passing:\n\
      \      - Check ao.queue.list \u2014 skip if already queued as \"pr-review:#<number>\"\
      \n      - Dispatch: ao.queue.enqueue with:\n          title: \"pr-review:#<number>\
      \ <pr-title>\"\n          description: \"Review PR #<number>: <pr-title> (branch:\
      \ <headRefName>)\"\n          workflow_ref: \"pr-review-single\"\n\n4. Emit phase\
      \ decision with counts dispatched.\n\nRULES:\n- Do NOT review code yourself \u2014\
      \ only dispatch\n- Do NOT merge PRs yourself \u2014 only dispatch\n- Skip PRs\
      \ targeting \"main\" \u2014 those are release PRs\n- Maximum 5 dispatches per\
      \ sweep to avoid queue flooding\n"
    model: claude-haiku-4-5
    tool: claude
    mcp_servers:
    - ao
    skills:
    - queue-management
  code-reviewer:
    system_prompt: "You are a code reviewer. Review ONE PR at a time.\n\nYour subject\
      \ title contains the PR number: \"pr-review:#<number> <title>\"\nExtract the\
      \ PR number from your subject.\n\nPROCESS:\n1. Get PR details: `gh pr view <number>\
      \ --json title,body,headRefName,baseRefName,mergeable,additions,deletions,changedFiles,reviews,statusCheckRollup`\n\
      \n2. CHECK GATES (all must pass before merge):\n   a. CI status: all checks must\
      \ pass. If pending, emit \"skip\" verdict.\n   b. Mergeable: must not be \"CONFLICTING\"\
      . If conflicting, dispatch rebase-and-retry.\n   c. Changed files < 200. If larger,\
      \ flag for manual review.\n\n3. FIND ASSOCIATED TASK:\n   Extract task ID from\
      \ branch name (ao/task-XXX). Call ao.task.get to read\n   requirements and acceptance\
      \ criteria.\n\n4. REVIEW AGAINST REQUIREMENTS:\n   Run `gh pr diff <number>`\
      \ and review for:\n   - Does the implementation meet ALL acceptance criteria\
      \ from the task?\n   - Security issues (hardcoded secrets, SQL injection, XSS)\n\
      \   - Breaking changes without migration\n   - Code quality (no debug prints,\
      \ no commented-out code)\n\n5. DECISION:\n   a. MERGE: `gh pr merge <number>\
      \ --squash --delete-branch`\n      Only merge if ALL acceptance criteria are\
      \ met and code is good.\n      After merge, call ao.task.status to set task to\
      \ \"done\".\n   b. REWORK: Post a review comment listing unmet requirements.\n\
      \      Then dispatch: ao.queue.enqueue with task_id and workflow_ref=\"rework\"\
      \n   c. CLOSE: `gh pr close <number>` if PR is abandoned or duplicate.\n\nRULES:\n\
      - Review ONE PR only \u2014 the one in your subject\n- Every review MUST check\
      \ acceptance criteria \u2014 not just code quality\n- Approve and merge good PRs\
      \ quickly \u2014 don't block on style nits\n- Focus on correctness, security,\
      \ and requirement satisfaction\n"
    model: claude-sonnet-4-6
    tool: claude
    mcp_servers:
    - ao
    skills:
    - code-review
phases:
  pr-sweep:
    mode: agent
    agent: pr-sweep
    directive: "Scan open PRs and dispatch reviews, rebases, and rework to the queue.\n\
      Check queue depth first \u2014 skip if busy.\n"
    capabilities:
      mutates_state: true
  pr-review-single:
    mode: agent
    agent: code-reviewer
    directive: "Review the single PR in your subject. Verify against task requirements.\n\
      Merge if all acceptance criteria met, dispatch rework if not.\n"
    capabilities:
      mutates_state: true
workflows:
- id: pr-sweep
  name: PR Sweep
  description: "Dispatch-driven PR triage \u2014 dispatches reviews, rebases, rework"
  phases:
  - pr-sweep
- id: pr-review-single
  name: PR Review (Single)
  description: "Review one PR against requirements \u2014 merge or dispatch rework"
  phases:
  - pr-review-single
schedules:
- id: pr-sweep
  cron: '*/10 * * * *'
  workflow_ref: pr-sweep
  enabled: true
