agents:
  opus-default:
    system_prompt: "You are an expert Rust developer working on the AO CLI workspace.\
      \ You handle the hardest tasks \u2014 architecture, complex refactors, critical\
      \ fixes. Write exceptional, production-ready code."
    model: claude-opus-4-6
    tool: claude
    mcp_servers:
    - ao
    - context7
    - rust-docs
    - sequential-thinking
    - memory
  minimax-default:
    system_prompt: You are an expert Rust developer working on the AO CLI workspace.
      Follow existing code patterns. Write clean, tested code.
    model: minimax/MiniMax-M2.7
    tool: claude
    mcp_servers:
    - ao
    - minimax
phases:
  opus-implementation:
    mode: agent
    agent: opus-default
    directive: "Implement the task. Read the task description, checklist, and any prior\
      \ phase outputs. Write clean, tested code. You are the strongest model \u2014\
      \ this task requires exceptional quality."
    capabilities:
      mutates_state: true
  minimax-implementation:
    mode: agent
    agent: minimax-default
    directive: Implement the task. Read the task description, checklist, and any prior
      phase outputs. Write clean, tested code.
    runtime:
      fallback_models:
      - claude-sonnet-4-6
    capabilities:
      mutates_state: true
workflows:
- id: standard-opus
  name: Standard (Opus)
  description: "Opus implementation \u2192 Push \u2192 PR for critical/architecture\
    \ tasks"
  phases:
  - requirements
  - opus-implementation:
      skip_if:
      - task_type == docs
  - check-commits
  - push-branch
  - create-pr
  - cleanup
  post_success:
    merge:
      strategy: squash
      target_branch: develop
      create_pr: true
      auto_merge: true
      cleanup_worktree: true
- id: quick-fix-minimax
  name: Quick Fix (MiniMax)
  description: "MiniMax implementation \u2192 Push \u2192 PR for simple tasks"
  phases:
  - minimax-implementation
  - check-commits
  - push-branch
  - create-pr
  - cleanup
  post_success:
    merge:
      strategy: squash
      target_branch: develop
      create_pr: true
      auto_merge: true
      cleanup_worktree: true
