agents:
  kimi-default:
    system_prompt: You are an expert Rust developer working on the AO CLI workspace. Follow existing code patterns. Write
      clean, tested code.
    model: claude-haiku-4-5
    tool: claude
  minimax-default:
    system_prompt: You are an expert Rust developer working on the AO CLI workspace. Follow existing code patterns. Write
      clean, tested code.
    model: minimax/MiniMax-M2.7
    tool: claude
  glm-default:
    system_prompt: You are an expert Rust developer working on the AO CLI workspace. Follow existing code patterns. Write
      clean, tested code.
    model: zai-coding-plan/glm-5-turbo
    tool: claude
  gemini-default:
    system_prompt: You are an expert Rust developer working on the AO CLI workspace. Follow existing code patterns. Write
      clean, tested code.
    model: gemini-3.1-pro-preview
    tool: gemini
  opus-default:
    system_prompt: "You are an expert Rust developer working on the AO CLI workspace. You handle the hardest tasks \u2014\
      \ architecture, complex refactors, critical fixes. Write exceptional, production-ready code."
    model: claude-opus-4-6
    tool: claude
    mcp_servers:
    - ao
    - context7
    - rust-docs
    - sequential-thinking
    - memory
  minimax-smoke-test:
    system_prompt: "You are a smoke test agent running on MiniMax via oai-runner.\nYour job is to verify the oai-runner \u2192\
      \ MiniMax API pipeline is working.\n\nOn each run:\n1. Confirm you can read files: run `cat CLAUDE.md | head -5` to\
      \ verify file access works.\n2. Confirm you can list files: run `ls crates/oai-runner/src/` to verify directory listing.\n\
      3. Confirm you have tool use: call at least one tool (read_file or list_files).\n4. Confirm AO MCP connectivity: call\
      \ ao.task.stats to get task statistics.\n5. Confirm AO MCP read: call ao.queue.stats to get queue statistics.\n6. Report\
      \ your model name, a timestamp, and \"PASS\" or \"FAIL\" for each check.\n7. If everything works, output a single JSON\
      \ line:\n   {\"status\": \"pass\", \"model\": \"minimax\", \"checks\": [\"file_read\", \"dir_list\", \"tool_use\", \"\
      mcp_task_stats\", \"mcp_queue_stats\"]}\n\nKeep it brief. Do not modify any files or tasks.\n"
    model: minimax/MiniMax-M2.5
    tool: claude
  glm-smoke-test:
    system_prompt: "You are a smoke test agent running on GLM (Z-AI) via oai-runner.\nYour job is to verify the oai-runner\
      \ \u2192 Z-AI API pipeline is working.\n\nOn each run:\n1. Confirm you can read files: run `cat CLAUDE.md | head -5`\
      \ to verify file access works.\n2. Confirm you can list files: run `ls crates/oai-runner/src/` to verify directory listing.\n\
      3. Confirm you have tool use: call at least one tool (read_file or list_files).\n4. Confirm AO MCP connectivity: call\
      \ ao.task.stats to get task statistics.\n5. Confirm AO MCP read: call ao.queue.stats to get queue statistics.\n6. Report\
      \ your model name, a timestamp, and \"PASS\" or \"FAIL\" for each check.\n7. If everything works, output a single JSON\
      \ line:\n   {\"status\": \"pass\", \"model\": \"glm\", \"checks\": [\"file_read\", \"dir_list\", \"tool_use\", \"mcp_task_stats\"\
      , \"mcp_queue_stats\"]}\n\nKeep it brief. Do not modify any files or tasks.\n"
    model: zai-coding-plan/glm-5-turbo
    tool: claude
phases:
  kimi-implementation:
    mode: agent
    agent: kimi-default
    directive: Implement the task. Read the task description, checklist, and any prior phase outputs. Write clean, tested
      code.
    runtime:
      fallback_models:
      - zai-coding-plan/glm-5-turbo
      - minimax/MiniMax-M2.5
      - claude-sonnet-4-6
      timeout_secs: 900
    capabilities:
      mutates_state: true
  minimax-implementation:
    mode: agent
    agent: minimax-default
    directive: Implement the task. Read the task description, checklist, and any prior phase outputs. Write clean, tested
      code.
    runtime:
      fallback_models:
      - zai-coding-plan/glm-5-turbo
      - claude-sonnet-4-6
    capabilities:
      mutates_state: true
  minimax-requirements:
    mode: agent
    agent: minimax-default
    directive: Refine the task into implementation-ready requirements with clear acceptance criteria.
    runtime:
      fallback_models:
      - zai-coding-plan/glm-5-turbo
      - claude-sonnet-4-6
    capabilities:
      mutates_state: true
  glm-implementation:
    mode: agent
    agent: glm-default
    directive: Implement the task. Read the task description, checklist, and any prior phase outputs. Write clean, tested
      code.
    runtime:
      fallback_models:
      - minimax/MiniMax-M2.5
      - claude-sonnet-4-6
    capabilities:
      mutates_state: true
  glm-requirements:
    mode: agent
    agent: glm-default
    directive: Refine the task into implementation-ready requirements with clear acceptance criteria.
    runtime:
      fallback_models:
      - minimax/MiniMax-M2.5
      - claude-sonnet-4-6
    capabilities:
      mutates_state: true
  gemini-implementation:
    mode: agent
    agent: gemini-default
    directive: Implement the task. Read the task description, checklist, and any prior phase outputs. Write clean, tested
      code.
    runtime:
      fallback_models:
      - claude-sonnet-4-6
    capabilities:
      mutates_state: true
  opus-implementation:
    mode: agent
    agent: opus-default
    directive: "Implement the task. Read the task description, checklist, and any prior phase outputs. Write clean, tested\
      \ code. You are the strongest model \u2014 this task requires exceptional quality."
    capabilities:
      mutates_state: true
  glm-smoke:
    mode: agent
    agent: glm-smoke-test
    directive: 'Run GLM/Z-AI API smoke test: verify file access, tool use, and AO MCP connectivity.'
    capabilities:
      mutates_state: false
  minimax-smoke:
    mode: agent
    agent: minimax-smoke-test
    directive: 'Run MiniMax API smoke test: verify file access, tool use, and AO MCP connectivity.'
    capabilities:
      mutates_state: false
workflows:
- id: standard-kimi
  name: Standard (Kimi K2.5)
  description: "Implement \u2192 Push \u2192 PR fast with Kimi"
  phases:
  - requirements
  - kimi-implementation:
      skip_if:
      - task_type == docs
  - push-branch
  - create-pr
  - cleanup
  post_success:
    merge:
      strategy: squash
      target_branch: develop
      create_pr: true
      auto_merge: true
      cleanup_worktree: true
