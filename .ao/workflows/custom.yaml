  pr-review:
    label: "PR Review"
    description: "Scan open PRs and perform code reviews with follow-up queueing"
    category: operations
    tags: [review, quality, pr]
  brain-requirement-scan:
    label: "Brain Requirement Scan"
    description: "List requirement candidates that still need planning work"
    category: planning
    tags: [brain, planning, requirements]
  brain-task-next:
    label: "Brain Task Selection"
    description: "Select the next task candidate to execute"
    category: planning
    tags: [brain, planning, tasks]

phases:
  triage:
    mode: agent
    agent: triager
    directive: "Evaluate whether the current task is still valid, already done, obsolete, or a duplicate."
    capabilities:
      mutates_state: true
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        skip_reason:
          type: string
          description: "When verdict is skip, explain whether the task is already_done, duplicate, no_longer_valid, or out_of_scope."
        recommended_task_status:
          type: string
          enum: [done, cancelled]
          description: "When verdict is skip, use done for already_done, otherwise cancelled."

  refine-requirements:
    mode: agent
    agent: requirements-refiner
    directive: "Refine the current task into implementation-ready scope with concrete acceptance criteria, checklist items, relevant code references, and constraints."
    capabilities:
      mutates_state: true
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        refined_scope:
          type: string
          description: "Concise summary of the refined task scope and implementation boundaries."
        acceptance_criteria_added:
          type: array
          description: "Acceptance criteria or checklist items that were added or clarified."
          items:
            type: string
        relevant_files:
          type: array
          description: "Repository files or modules the implementation phase should inspect or edit."
          items:
            type: string

  implementation:
    mode: agent
    agent: default
    directive: "Implement production-quality code for this task. Keep changes focused and executable."
    output_contract:
      kind: implementation_result
      required_fields: [commit_message]
      fields:
        summary:
          type: string
          description: "Short summary of the completed implementation work."
        changed_files:
          type: array
          description: "Files changed by the implementation phase."
          items:
            type: string
        validation_commands:
          type: array
          description: "Commands the implementation phase ran to validate the change."
          items:
            type: string
    decision_contract:
      required_evidence: [files_modified]
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        residual_risks:
          type: array
          description: "Known risks or follow-up concerns that remain after implementation."
          items:
            type: string

  code-review:
    mode: agent
    agent_id: default
    directive: "Review the implementation for defects, edge cases, and maintainability issues. Do NOT make changes yourself. If issues are found, set verdict to rework and provide an exact spec of what must be fixed in the reason field. Only advance if the code is production-ready as-is."
    decision_contract:
      required_evidence: [code_review_clean]
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        review_summary:
          type: string
          description: "Short review summary explaining why the branch is approved or sent back."
        blocking_issues:
          type: array
          description: "Concrete blocking defects or rework items discovered during review."
          items:
            type: string

  po-review:
    mode: agent
    agent: po-reviewer
    directive: "Review the delivered work against product intent and acceptance criteria. Do not edit code. If gaps remain, set verdict to rework and update the task/checklist through AO MCP with precise next actions."
    capabilities:
      mutates_state: true
    decision_contract:
      required_evidence: [requirements_met]
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        requirements_verified:
          type: array
          description: "Acceptance criteria or product requirements confirmed as satisfied."
          items:
            type: string
        unmet_requirements:
          type: array
          description: "Acceptance criteria or product requirements still missing or only partially satisfied."
          items:
            type: string
        product_summary:
          type: string
          description: "Short product-facing assessment of the delivered behavior and remaining gaps."

  brain-requirement-scan:
    mode: command
    directive: "List top requirement candidates that need work"
    command:
      cwd_mode: task_root
      program: cargo
      args: ["run", "-p", "orchestrator-cli", "--", "--project-root", ".", "requirements", "list", "--json", "--limit", "10"]
      timeout_secs: 300

  brain-task-next:
    mode: command
    directive: "Pick the next highest-priority task candidate"
    command:
      cwd_mode: task_root
      program: cargo
      args: ["run", "-p", "orchestrator-cli", "--", "--project-root", ".", "task", "next", "--json"]
      timeout_secs: 300

  testing:
    mode: manual
    directive: "Manual testing gate — human verifies the implementation meets requirements."
    manual:
      instructions: "Review the implementation changes, run manual tests if needed, and approve or reject."
      approval_note_required: false

  work-planning:
    mode: agent
    agent: work-planner
    directive: "Scan the task backlog, check eligibility and dependencies, and enqueue ready work for the daemon via ao.queue.enqueue."
    capabilities:
      mutates_state: true
  task-reconciliation:
    mode: agent
    agent: reconciler
    directive: "Detect and fix task state inconsistencies: stale in-progress tasks, resolved dependency gates, and completed-but-unmarked tasks."
    capabilities:
      mutates_state: true
  cleanup:
    mode: command
    directive: "Delete cargo build artifacts to free disk space"
    command:
      cwd_mode: task_root
      program: cargo
      args: ["clean"]
      timeout_secs: 60
  system-health-check:
    mode: agent
    agent: system-monitor
    directive: "Run system health checks: build, tests, daemon, disk, queue, stale PRs. Log tasks for any issues found."
    capabilities:
      mutates_state: true
  workflow-optimization:
    mode: agent
    agent: workflow-optimizer
    directive: "Analyze workflow failures, daemon logs, queue throughput, and cron effectiveness. Create improvement tasks for the AO system."
    capabilities:
      mutates_state: true
  release-management:
    mode: agent
    agent: release-manager
    directive: "Evaluate release readiness, cut release branches from develop, manage release lifecycle."
    capabilities:
      mutates_state: true
  release-gate-check:
    mode: agent
    agent: release-gate-checker
    directive: "Verify release branch CI, check quality gates, merge approved releases to main."
    capabilities:
      mutates_state: true
  branch-sync-check:
    mode: agent
    agent: branch-sync-monitor
    directive: "Check for develop/main divergence and create sync tasks."
    capabilities:
      mutates_state: true
  push-branch:
    mode: command
    directive: "Push the current branch to origin"
    command:
      program: git
      args: ["push", "-u", "origin", "HEAD"]
      cwd_mode: task_root
      timeout_secs: 60
      success_exit_codes: [0, 1, 128]
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
  create-pr:
    mode: command
    directive: "Create a GitHub PR from the current branch to develop"
    command:
      program: gh
      args: ["pr", "create", "--fill", "--base", "develop"]
      cwd_mode: task_root
      timeout_secs: 60
      success_exit_codes: [0, 1]
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
  force-push:
    mode: command
    directive: "Force push rebased branch"
    command:
      program: git
      args: ["push", "--force-with-lease", "origin", "HEAD"]
      cwd_mode: task_root
      timeout_secs: 60
      success_exit_codes: [0, 1, 128]
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
  sync-main:
    mode: command
    directive: "Pull latest origin/main into project root"
    command:
      program: git
      args: ["pull", "origin", "main", "--ff-only"]
      timeout_secs: 30
      success_exit_codes: [0, 1, 128]
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
  rebase-on-main:
    mode: agent
    agent: default
    directive: |
      This branch has merge conflicts with main/develop. Rebase it.
      1. Run: git fetch origin develop
      2. Run: git rebase origin/develop
      3. For each conflict, resolve by keeping BOTH sides of changes.
         For Cargo.lock: accept theirs, run cargo build to regenerate.
         For code files: integrate both changes.
      4. After resolving: git add <file>, then git rebase --continue
      5. Run cargo build to verify the project compiles.
      6. If fundamentally incompatible, abort with git rebase --abort.
    capabilities:
      mutates_state: true
  address-review:
    mode: agent
    agent: default
    directive: |
      A PR reviewer has requested changes. Address the feedback.
      1. Get the task ID from context. Read task via ao.task.get.
      2. Find the PR: gh pr list --state open --head <branch> --json number
      3. Read review comments: gh pr view <number> --json reviews,comments
      4. For each requested change, make the code fix.
      5. After all changes: git add -A && git commit referencing the review.
      6. Verify cargo build passes.
    capabilities:
      mutates_state: true
  pr-review:
    mode: agent
    agent: pr-reviewer
    directive: "Scan open GitHub PRs, review unreviewed ones, post review comments, and queue follow-up work for critical issues."
    skills:
      - code-review
    capabilities:
      mutates_state: true
  unit-test:
    mode: command
    directive: "Run the workspace test suite"
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
          description: "Process exit code returned by the test command."
        failure_summary:
          type: string
          description: "High-level summary of the failing test command when verdict is rework."
        failing_tests:
          type: array
          description: "Failing test names extracted from the command output when available."
          items:
            type: string
        suggested_fix_focus:
          type: string
          description: "Short summary of what the next repair loop should focus on."
    command:
      cwd_mode: task_root
      program: cargo
      args: ["test", "--workspace"]
      timeout_secs: 600
      success_exit_codes: [0, 1, 101]

  lint:
    mode: command
    directive: "Run clippy with deny warnings"
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
          description: "Process exit code returned by the lint command."
        failure_summary:
          type: string
          description: "High-level summary of the lint failure when verdict is rework."
        suggested_fix_focus:
          type: string
          description: "Short summary of what the next repair loop should focus on."
    command:
      cwd_mode: task_root
      program: cargo
      args: ["clippy", "--workspace", "--", "-D", "warnings"]
      success_exit_codes: [0, 1, 101]
      timeout_secs: 120
  codex-implementation:
    mode: agent
    agent: codex-default
    directive: "Implement the task. Read the task description, checklist, and any prior phase outputs. Write clean, tested code."
    runtime:
      fallback_models: ["claude-sonnet-4-6"]
    capabilities:
      mutates_state: true
  opus-implementation:
    mode: agent
    agent: opus-default
    directive: "Implement the task. Read the task description, checklist, and any prior phase outputs. Write clean, tested code. You are the strongest model — this task requires exceptional quality."
    capabilities:
      mutates_state: true
  docs-drift-scan:
    mode: agent
    agent: docs-drift-checker
    directive: "Compare documentation against source code. Create tasks for any drift found."
    capabilities:
      mutates_state: true
  web-ui-scan:
    mode: agent
    agent: web-ui-improver
    directive: "Scan the web API, GraphQL layer, and React UI. Create focused improvement tasks."
    capabilities:
      mutates_state: true
  mcp-server-scan:
    mode: agent
    agent: mcp-server-improver
    directive: "Scan MCP tool implementations and docs. Create focused improvement tasks."
    capabilities:
      mutates_state: true
  codex-code-review:
    mode: agent
    agent: codex-default
    directive: "Review the implementation against the task requirements and acceptance criteria. Check for: requirement misalignment, missing acceptance criteria, edge cases, logic errors, and code quality. Do NOT make changes. If issues found, set verdict to rework with exact details of what must be fixed. Only advance if code fully satisfies the task spec."
    decision_contract:
      required_evidence: [code_review_clean]
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        review_summary:
          type: string
          description: "Short review summary explaining why the branch is approved or sent back."
        blocking_issues:
          type: array
          description: "Concrete blocking defects or requirement misalignments discovered."
          items:
            type: string
        requirements_verified:
          type: array
          description: "Acceptance criteria confirmed as satisfied."
          items:
            type: string
    capabilities:
      mutates_state: false
  glm-implementation:
    mode: agent
    agent: glm-default
    directive: "Implement the task. Read the task description, checklist, and any prior phase outputs. Write clean, tested code."
    runtime:
      fallback_models: ["minimax/MiniMax-M2.5", "claude-sonnet-4-6"]
    capabilities:
      mutates_state: true
  minimax-implementation:
    mode: agent
    agent: minimax-default
    directive: "Implement the task. Read the task description, checklist, and any prior phase outputs. Write clean, tested code."
    runtime:
      fallback_models: ["zai-coding-plan/glm-5-turbo", "claude-sonnet-4-6"]
    capabilities:
      mutates_state: true
  kimi-implementation:
    mode: agent
    agent: kimi-default
    directive: "Implement the task. Read the task description, checklist, and any prior phase outputs. Write clean, tested code."
    runtime:
      fallback_models: ["zai-coding-plan/glm-5-turbo", "minimax/MiniMax-M2.5", "claude-sonnet-4-6"]
    capabilities:
      mutates_state: true
  gemini-implementation:
    mode: agent
    agent: gemini-default
    directive: "Implement the task. Read the task description, checklist, and any prior phase outputs. Write clean, tested code."
    runtime:
      fallback_models: ["claude-sonnet-4-6"]
    capabilities:
      mutates_state: true
  glm-requirements:
    mode: agent
    agent: glm-default
    directive: "Refine the task into implementation-ready requirements with clear acceptance criteria."
    runtime:
      fallback_models: ["minimax/MiniMax-M2.5", "claude-sonnet-4-6"]
    capabilities:
      mutates_state: true
  minimax-requirements:
    mode: agent
    agent: minimax-default
    directive: "Refine the task into implementation-ready requirements with clear acceptance criteria."
    runtime:
      fallback_models: ["zai-coding-plan/glm-5-turbo", "claude-sonnet-4-6"]
    capabilities:
      mutates_state: true
  minimax-smoke:
    mode: agent
    agent: minimax-smoke-test
    directive: "Run MiniMax API smoke test: verify file access, tool use, and AO MCP connectivity."
    capabilities:
      mutates_state: false
  glm-smoke:
    mode: agent
    agent: glm-smoke-test
    directive: "Run GLM/Z-AI API smoke test: verify file access, tool use, and AO MCP connectivity."
    capabilities:
      mutates_state: false

workflows:
  - id: requirement-task-generation
    name: "Requirement Task Generation"
    description: "Create or refine requirement-linked AO tasks through typed mutation tools"
    phases:
      - requirement-task-generation

  - id: requirement-task-generation-run
    name: "Requirement Task Generation + Workflow Start"
    description: "Create or refine requirement-linked tasks, then start workflows for the eligible linked tasks"
    phases:
      - requirement-task-generation
      - requirement-workflow-bootstrap

  - id: triage
    name: "Task Triage"
    description: "Single-phase workflow that evaluates whether a task is still valid"
    phases:
      - triage

  - id: refine
    name: "Refine Requirements"
    description: "Single-phase workflow that refines task descriptions into implementation-ready specs"
    phases:
      - refine-requirements

  - id: ao-task-complete
    name: "AO Task Complete"
    description: "AO project delivery workflow that triages, refines, implements, validates, reviews, and product-signs-off a task to completion"
    phases:
      - triage
      - refine-requirements:
          max_rework_attempts: 2
      - implementation:
          max_rework_attempts: 4
      - unit-test:
          max_rework_attempts: 2
          on_verdict:
            rework:
              target: implementation
      - lint:
          max_rework_attempts: 2
          on_verdict:
            rework:
              target: implementation
      - code-review:
          max_rework_attempts: 3
          on_verdict:
            rework:
              target: implementation
      - po-review:
          max_rework_attempts: 2
          on_verdict:
            rework:
              target: refine-requirements
    post_success:
      merge:
        strategy: squash
        target_branch: develop
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  - id: full
    name: "Full Lifecycle"
    description: "End-to-end: triage, refine requirements, implement, test/lint gates, code review, PO sign-off, merge"
    phases:
      - triage
      - refine-requirements
      - implementation
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - code-review:
          on_verdict:
            rework:
              target: implementation
      - po-review:
          on_verdict:
            rework:
              target: implementation
      - cleanup
    post_success:
      merge:
        strategy: squash
        target_branch: develop
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  - id: review-cycle
    name: "Review Cycle"
    description: "Reusable review sequence: unit-test, lint, code-review, manual testing gate"
    phases:
      - unit-test
      - lint
      - code-review
      - testing

  - id: quick-fix
    name: "Quick Fix"
    description: "Fast workflow for small bug fixes"
    phases:
      - implementation
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - testing
      - cleanup

  - id: standard
    name: "Standard"
    description: "Requirements → Implement → Test → Lint → Review → Push → PR"
    phases:
      - requirements
      - implementation:
          skip_if:
            - "task_type == docs"
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - code-review:
          max_rework_attempts: 3
          on_verdict:
            rework:
              target: implementation
      - push-branch
      - push-branch
      - create-pr
      - cleanup

  - id: standard-glm
    name: "Standard (GLM)"
    description: "Standard workflow using GLM/Z-AI for implementation, Codex for review"
    phases:
      - glm-requirements
      - glm-implementation:
          skip_if:
            - "task_type == docs"
      - unit-test:
          on_verdict:
            rework:
              target: glm-implementation
      - lint:
          on_verdict:
            rework:
              target: glm-implementation
      - codex-code-review:
          max_rework_attempts: 3
          on_verdict:
            rework:
              target: glm-implementation
      - push-branch
      - create-pr
      - cleanup
    post_success:
      merge:
        strategy: squash
        target_branch: develop
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  - id: standard-minimax
    name: "Standard (MiniMax)"
    description: "Standard workflow using MiniMax for implementation, Codex for review"
    phases:
      - minimax-requirements
      - minimax-implementation:
          skip_if:
            - "task_type == docs"
      - unit-test:
          on_verdict:
            rework:
              target: minimax-implementation
      - lint:
          on_verdict:
            rework:
              target: minimax-implementation
      - codex-code-review:
          max_rework_attempts: 2
          on_verdict:
            rework:
              target: minimax-implementation
      - push-branch
      - create-pr
      - cleanup
    post_success:
      merge:
        strategy: squash
        target_branch: develop
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  - id: standard-kimi
    name: "Standard (Kimi K2.5)"
    description: "Standard workflow using Kimi K2.5 via OpenRouter — multimodal agentic model for complex tasks"
    phases:
      - requirements
      - kimi-implementation:
          skip_if:
            - "task_type == docs"
      - unit-test:
          on_verdict:
            rework:
              target: kimi-implementation
      - lint:
          on_verdict:
            rework:
              target: kimi-implementation
      - codex-code-review:
