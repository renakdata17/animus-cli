      - create-pr
      - cleanup

  - id: brain
    name: "Brain Planner"
    description: "Planning workflow that triages and refines current work, then surfaces next requirement and task candidates"
    phases:
      - triage
      - refine-requirements
      - brain-requirement-scan
      - brain-task-next

  - id: triage
    name: "Triage & Dispatch"
    description: "Validate task, check if done/duplicate, dispatch to the right implementation workflow"
    phases:
      - triage

  - id: work-planner
    name: "Work Planner"
    description: "Feed ready tasks into the triage pipeline"
    phases:
      - work-planning

  - id: task-reconciler
    name: "Task Reconciler"
    description: "Detects and fixes task state inconsistencies: stale tasks, resolved gates, completed projections"
    phases:
      - task-reconciliation

  - id: pr-reviewer
    name: "PR Reviewer"
    description: "Scans open PRs, performs code reviews, and queues follow-up work for issues found"
    phases:
      - pr-review

  - id: minimax-smoke-test
    name: "MiniMax Smoke Test"
    description: "Verify oai-runner → MiniMax API pipeline: file ops, tool use, AO MCP connectivity"
    phases:
      - minimax-smoke

  - id: glm-smoke-test
    name: "GLM Smoke Test"
    description: "Verify oai-runner → GLM/Z-AI API pipeline: file ops, tool use, AO MCP connectivity"
    phases:
      - glm-smoke

  - id: docs-drift-checker
    name: "Documentation Drift Checker"
    description: "Hourly scan for documentation that has fallen behind code changes"
    phases:
      - docs-drift-scan

  - id: po-oai-runner
    name: "PO: oai-runner"
    description: "Product Owner scan of oai-runner and model routing"
    phases:
      - po-oai-runner-scan

  - id: po-web
    name: "PO: Web Surface"
    description: "Product Owner scan of web API, GraphQL, and React UI"
    phases:
      - po-web-scan

  - id: po-mcp
    name: "PO: MCP Tools"
    description: "Product Owner scan of MCP tool implementations"
    phases:
      - po-mcp-scan

  - id: po-workflow
    name: "PO: Workflow Engine"
    description: "Product Owner scan of workflow runner and config"
    phases:
      - po-workflow-scan

  - id: po-agent-runner
    name: "PO: Agent Runner"
    description: "Product Owner scan of agent runner and CLI wrappers"
    phases:
      - po-agent-runner-scan

  - id: po-cli
    name: "PO: CLI Surface"
    description: "Product Owner scan of CLI commands and core services"
    phases:
      - po-cli-scan

  - id: architect-rust
    name: "Architect: Rust Workspace"
    description: "Audit workspace structure, dependency graph, traits"
    phases:
      - architect-rust-audit

  - id: architect-infra
    name: "Architect: Infrastructure"
    description: "Audit CI/CD, release pipeline, build infrastructure"
    phases:
      - architect-infra-audit

  - id: researcher-models
    name: "Researcher: LLM Models"
    description: "Research new models, providers, and pricing"
    phases:
      - researcher-models-scan

  - id: researcher-ecosystem
    name: "Researcher: Ecosystem"
    description: "Research useful Rust crates, MCP servers, tools"
    phases:
      - researcher-ecosystem-scan

  - id: requirement-review
    name: "Master Requirement Review"
    description: "Review pending requirements, convert approved ones to tasks"
    phases:
      - requirement-review

  - id: web-ui-improver
    name: "Web UI Improver (legacy)"
    description: "Legacy — replaced by po-web"
    phases:
      - web-ui-scan

  - id: mcp-server-improver
    name: "MCP Server Improver (legacy)"
    description: "Legacy — replaced by po-mcp"
    phases:
      - mcp-server-scan

  - id: system-monitor
    name: "System Monitor"
    description: "Hourly health check: build, tests, daemon, disk, queue, stale PRs"
    phases:
      - system-health-check

  - id: workflow-optimizer
    name: "Workflow Optimizer"
    description: "Analyzes workflow patterns, failure rates, and daemon logs to create self-improvement tasks"
    phases:
      - workflow-optimization

  - id: release-manager
    name: "Release Manager"
    description: "Evaluate release readiness, cut release branches from develop, tag and publish releases"
    phases:
      - release-management

  - id: release-gate
    name: "Release Gate"
    description: "Verify release branches pass CI and quality gates before merging to main"
    phases:
      - release-gate-check

  - id: branch-sync
    name: "Branch Sync Monitor"
    description: "Monitor develop/main divergence and flag sync issues"
    phases:
      - branch-sync-check

  - id: rework
    name: "Rework"
    description: "Address reviewer feedback, push fixes, re-review"
    phases:
      - address-review
      - force-push

  - id: rebase-and-retry
    name: "Rebase and Retry"
    description: "Rebase conflicting branch on develop, force push"
    phases:
      - rebase-on-main
      - force-push

  - id: sync-main
    name: "Sync Main"
    description: "Pull latest origin/main into project root"
    phases:
      - sync-main

  - id: hotfix
    name: "Hotfix"
    description: "Emergency fix → Push → PR targeting main"
    phases:
      - implementation
      - push-branch
      - create-pr
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: false
        cleanup_worktree: true

