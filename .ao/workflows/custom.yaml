    name: "GLM Smoke Test"
    description: "Verify oai-runner → GLM/Z-AI API pipeline: file ops, tool use, AO MCP connectivity"
    phases:
      - glm-smoke

  - id: docs-drift-checker
    name: "Documentation Drift Checker"
    description: "Hourly scan for documentation that has fallen behind code changes"
    phases:
      - docs-drift-scan

  - id: web-ui-improver
    name: "Web UI Improver"
    description: "Hourly scan of web API, GraphQL, and React UI to create focused improvement tasks"
    phases:
      - web-ui-scan

  - id: mcp-server-improver
    name: "MCP Server Improver"
    description: "Hourly scan of MCP tool implementations and docs to create improvement tasks"
    phases:
      - mcp-server-scan

  - id: system-monitor
    name: "System Monitor"
    description: "Hourly health check: build, tests, daemon, disk, queue, stale PRs"
    phases:
      - system-health-check

  - id: workflow-optimizer
    name: "Workflow Optimizer"
    description: "Analyzes workflow patterns, failure rates, and daemon logs to create self-improvement tasks"
    phases:
      - workflow-optimization

  - id: release-manager
    name: "Release Manager"
    description: "Evaluate release readiness, cut release branches from develop, tag and publish releases"
    phases:
      - release-management

  - id: release-gate
    name: "Release Gate"
    description: "Verify release branches pass CI and quality gates before merging to main"
    phases:
      - release-gate-check

  - id: branch-sync
    name: "Branch Sync Monitor"
    description: "Monitor develop/main divergence and flag sync issues"
    phases:
      - branch-sync-check

  - id: rework
    name: "Rework"
    description: "Address reviewer feedback, push fixes, re-review"
    phases:
      - address-review
      - force-push

  - id: rebase-and-retry
    name: "Rebase and Retry"
    description: "Rebase conflicting branch on develop, force push"
    phases:
      - rebase-on-main
      - force-push

  - id: sync-main
    name: "Sync Main"
    description: "Pull latest origin/main into project root"
    phases:
      - sync-main

  - id: hotfix
    name: "Hotfix"
    description: "Emergency fix targeting main directly, bypasses develop"
    phases:
      - implementation
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: false
        cleanup_worktree: true

schedules:
  - id: sync-main
    cron: "*/5 * * * *"
    workflow_ref: sync-main
    enabled: true

  - id: work-planner
    cron: "*/5 * * * *"
    workflow_ref: work-planner
    enabled: true

  - id: task-reconciler
    cron: "*/5 * * * *"
    workflow_ref: task-reconciler
    enabled: true

  - id: pr-reviewer
    cron: "*/5 * * * *"
    workflow_ref: pr-reviewer
    enabled: true

  - id: docs-drift-checker
    cron: "50 */2 * * *"
    workflow_ref: docs-drift-checker
    enabled: true

  - id: web-ui-improver
    cron: "20 * * * *"
    workflow_ref: web-ui-improver
    enabled: true

  - id: mcp-server-improver
    cron: "40 * * * *"
    workflow_ref: mcp-server-improver
    enabled: true

  - id: system-monitor
    cron: "0 * * * *"
    workflow_ref: system-monitor
    enabled: true

  - id: workflow-optimizer
    cron: "30 */2 * * *"
    workflow_ref: workflow-optimizer
    enabled: true

  - id: release-manager
    cron: "0 */6 * * *"
    workflow_ref: release-manager
    enabled: true

  - id: release-gate
    cron: "15 * * * *"
    workflow_ref: release-gate
    enabled: true

  - id: branch-sync
    cron: "45 */4 * * *"
    workflow_ref: branch-sync
    enabled: true

  - id: minimax-smoke-test
    cron: "0 */3 * * *"
    workflow_ref: minimax-smoke-test
    enabled: true

  - id: glm-smoke-test
    cron: "10 */3 * * *"
    workflow_ref: glm-smoke-test
    enabled: true
