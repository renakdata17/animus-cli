tools_allowlist:
  - cargo

agents:
  default:
    model: claude-sonnet-4-6
    tool: claude

  work-planner:
    system_prompt: |
      You are the AO work planner. Your job is to scan the task backlog, determine what is ready to execute, and enqueue work for the daemon.

      On each run you MUST:
      1. Call ao.task.list with status "backlog" to find promotable tasks. For each with no unsatisfied dependencies, call ao.task.status to set it to "ready".
      2. Call ao.task.list with status "blocked" to find unblockable tasks. If blocking condition resolved, set to "ready".
      3. Call ao.task.prioritized to get highest priority ready tasks.
      4. Call ao.queue.stats to check queue depth and daemon capacity.
      5. For each eligible ready task (up to capacity), call ao.queue.enqueue with --task-id.

      Do NOT enqueue tasks that have unsatisfied dependencies, are paused/cancelled, already in queue, or have consecutive_dispatch_failures > 3.
      Check ao.daemon.health for pool capacity. Be conservative.
    model: claude-sonnet-4-6
    tool: claude

  reconciler:
    system_prompt: |
      You are the AO task reconciler. Detect and fix task state inconsistencies.

      Check for: (1) stale in-progress tasks with no active workflow — set back to ready, (2) blocked tasks whose dependencies are now done — unblock to ready, (3) tasks with completed workflows still marked in-progress — set to done.

      Use ao.task.list and ao.task.get to inspect, ao.task.status to fix. Be precise.
    model: claude-sonnet-4-6
    tool: claude

  po-reviewer:
    system_prompt: |
      You are a Product Owner reviewing completed development work.
      Your job is to verify that ALL acceptance criteria and requirements
      from the original task are fully met by the implementation.
      You must be thorough and check every requirement, not just a sample.

      When sending work back for rework, you MUST update the task via AO MCP tools:
      - Use ao.task.checklist-update to mark verified criteria as complete
      - Use ao.task.update to append specific implementation notes describing
        exactly what needs to change, which files, and expected behavior
      - Add new checklist items via ao.task.checklist-add for any gaps discovered

      The implementation agent reads the task description and checklist to know
      what to fix — if you don't update the task, the rework will be blind.
      Use the runtime-provided phase contract instructions for the final structured verdict output.
    model: claude-sonnet-4-6
    tool: claude

  requirements-refiner:
    system_prompt: |
      You are a requirements analyst for the ao-cli Rust workspace.
      Your job is to take a task with a vague or incomplete description and
      refine it into a well-specified task with clear, testable acceptance criteria.

      For each task you MUST:
      1. Read the task description using ao.task.get
      2. Search the codebase to understand the relevant code, patterns, and constraints
      3. Identify the specific files, modules, and interfaces involved
      4. Write clear acceptance criteria that an implementation agent can verify
      5. Update the task description using ao.task.update with:
         - A refined description that includes context, scope, and approach
         - Numbered acceptance criteria (AC1, AC2, ...) that are concrete and testable
         - Any relevant file paths or code references discovered
         - Edge cases and constraints to consider
      6. Add checklist items using ao.task.checklist-add for each acceptance criterion

      Do NOT change the task title. Focus on making the description implementation-ready.
      If the task is already well-specified, leave it unchanged and note that.
      Use the runtime-provided phase contract instructions for the final structured verdict output.
    model: claude-sonnet-4-6
    tool: claude

  triager:
    system_prompt: |
      You are a task triager for the ao-cli Rust workspace.
      Your job is to evaluate whether a task is still valid, already completed,
      outdated, or a duplicate given the current state of the codebase.

      For each task, you MUST output exactly one verdict:
      - KEEP: Task is still valid and worth doing — leave status unchanged
      - DONE: Already implemented — use ao.task.status to set status to 'done'
      - OBSOLETE: No longer relevant — use ao.task.status to set status to 'cancelled'
      - DUPLICATE: Duplicates another task — use ao.task.status to set status to 'cancelled'

      You MUST use the AO MCP tools (ao.task.status) to update the task status
      for DONE/OBSOLETE/DUPLICATE verdicts. For KEEP, leave the status unchanged.
      Search the codebase thoroughly before making your verdict.
      Be concise: one verdict line, then 1-2 sentences of justification.
      Use the runtime-provided phase contract instructions for the final structured verdict output.
      Use "advance" for KEEP, "skip" for DONE/OBSOLETE/DUPLICATE when the task should not continue.
    model: claude-sonnet-4-6
    tool: claude

phase_catalog:
  po-review:
    label: "PO Review"
    description: "Product Owner sign-off on completed work"
    category: review
    tags: [review, sign-off]
  triage:
    label: "Triage"
    description: "Evaluate whether a task is still valid, already done, or obsolete"
    category: planning
    tags: [triage, planning]
  refine-requirements:
    label: "Refine Requirements"
    description: "Refine vague task descriptions into well-specified acceptance criteria"
    category: planning
    tags: [requirements, planning]
  implementation:
    label: "Implementation"
    description: "Implement production-quality code changes"
    category: development
    tags: [coding, implementation]
  code-review:
    label: "Code Review"
    description: "Review implementation for defects and maintainability"
    category: review
    tags: [review, quality]
  testing:
    label: "Testing"
    description: "Manual testing gate — human verifies the implementation"
    category: verification
    tags: [testing, quality]
  requirements:
    label: "Requirements"
    description: "Validate and refine task requirements before implementation"
    category: planning
    tags: [requirements, planning]
  requirement-task-generation:
    label: "Requirement Task Generation"
    description: "Create or refine linked tasks for a requirement through typed AO tools"
    category: planning
    tags: [requirements, planning, task-generation]
  requirement-workflow-bootstrap:
    label: "Requirement Workflow Bootstrap"
    description: "Start task workflows for linked requirement tasks"
    category: planning
    tags: [requirements, planning, orchestration]
  work-planning:
    label: "Work Planning"
    description: "Scan tasks, check eligibility, and enqueue dispatches for the daemon"
    category: planning
    tags: [planning, dispatch, queue]
  task-reconciliation:
    label: "Task Reconciliation"
    description: "Detect and fix task state inconsistencies"
    category: operations
    tags: [reconciliation, state-management]
  brain-requirement-scan:
    label: "Brain Requirement Scan"
    description: "List requirement candidates that still need planning work"
    category: planning
    tags: [brain, planning, requirements]
  brain-task-next:
    label: "Brain Task Selection"
    description: "Select the next task candidate to execute"
    category: planning
    tags: [brain, planning, tasks]

phases:
  triage:
    mode: agent
    agent: triager
    directive: "Evaluate whether the current task is still valid, already done, obsolete, or a duplicate."
    capabilities:
      mutates_state: true
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        skip_reason:
          type: string
          description: "When verdict is skip, explain whether the task is already_done, duplicate, no_longer_valid, or out_of_scope."
        recommended_task_status:
          type: string
          enum: [done, cancelled]
          description: "When verdict is skip, use done for already_done, otherwise cancelled."

  refine-requirements:
    mode: agent
    agent: requirements-refiner
    directive: "Refine the current task into implementation-ready scope with concrete acceptance criteria, checklist items, relevant code references, and constraints."
    capabilities:
      mutates_state: true
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        refined_scope:
          type: string
          description: "Concise summary of the refined task scope and implementation boundaries."
        acceptance_criteria_added:
          type: array
          description: "Acceptance criteria or checklist items that were added or clarified."
          items:
            type: string
        relevant_files:
          type: array
          description: "Repository files or modules the implementation phase should inspect or edit."
          items:
            type: string

  implementation:
    mode: agent
    agent: default
    directive: "Implement production-quality code for this task. Keep changes focused and executable."
    output_contract:
      kind: implementation_result
      required_fields: [commit_message]
      fields:
        summary:
          type: string
          description: "Short summary of the completed implementation work."
        changed_files:
          type: array
          description: "Files changed by the implementation phase."
          items:
            type: string
        validation_commands:
          type: array
          description: "Commands the implementation phase ran to validate the change."
          items:
            type: string
    decision_contract:
      required_evidence: [files_modified]
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        residual_risks:
          type: array
          description: "Known risks or follow-up concerns that remain after implementation."
          items:
            type: string

  code-review:
    mode: agent
    agent_id: default
    directive: "Review the implementation for defects, edge cases, and maintainability issues. Do NOT make changes yourself. If issues are found, set verdict to rework and provide an exact spec of what must be fixed in the reason field. Only advance if the code is production-ready as-is."
    decision_contract:
      required_evidence: [code_review_clean]
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        review_summary:
          type: string
          description: "Short review summary explaining why the branch is approved or sent back."
        blocking_issues:
          type: array
          description: "Concrete blocking defects or rework items discovered during review."
          items:
            type: string

  po-review:
    mode: agent
    agent: po-reviewer
    directive: "Review the delivered work against product intent and acceptance criteria. Do not edit code. If gaps remain, set verdict to rework and update the task/checklist through AO MCP with precise next actions."
    capabilities:
      mutates_state: true
    decision_contract:
      required_evidence: [requirements_met]
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        requirements_verified:
          type: array
          description: "Acceptance criteria or product requirements confirmed as satisfied."
          items:
            type: string
        unmet_requirements:
          type: array
          description: "Acceptance criteria or product requirements still missing or only partially satisfied."
          items:
            type: string
        product_summary:
          type: string
          description: "Short product-facing assessment of the delivered behavior and remaining gaps."

  brain-requirement-scan:
    mode: command
    directive: "List top requirement candidates that need work"
    command:
      cwd_mode: task_root
      program: cargo
      args: ["run", "-p", "orchestrator-cli", "--", "--project-root", ".", "requirements", "list", "--json", "--limit", "10"]
      timeout_secs: 300

  brain-task-next:
    mode: command
    directive: "Pick the next highest-priority task candidate"
    command:
      cwd_mode: task_root
      program: cargo
      args: ["run", "-p", "orchestrator-cli", "--", "--project-root", ".", "task", "next", "--json"]
      timeout_secs: 300

  testing:
    mode: manual
    directive: "Manual testing gate — human verifies the implementation meets requirements."
    manual:
      instructions: "Review the implementation changes, run manual tests if needed, and approve or reject."
      approval_note_required: false

  work-planning:
    mode: agent
    agent: work-planner
    directive: "Scan the task backlog, check eligibility and dependencies, and enqueue ready work for the daemon via ao.queue.enqueue."
    capabilities:
      mutates_state: true
  task-reconciliation:
    mode: agent
    agent: reconciler
    directive: "Detect and fix task state inconsistencies: stale in-progress tasks, resolved dependency gates, and completed-but-unmarked tasks."
    capabilities:
      mutates_state: true
  unit-test:
    mode: command
    directive: "Run the workspace test suite"
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
          description: "Process exit code returned by the test command."
        failure_summary:
          type: string
          description: "High-level summary of the failing test command when verdict is rework."
        failing_tests:
          type: array
          description: "Failing test names extracted from the command output when available."
          items:
            type: string
        suggested_fix_focus:
          type: string
          description: "Short summary of what the next repair loop should focus on."
    command:
      cwd_mode: task_root
      program: cargo
      args: ["test", "--workspace"]
      timeout_secs: 600

  lint:
    mode: command
    directive: "Run clippy with deny warnings"
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
          description: "Process exit code returned by the lint command."
        failure_summary:
          type: string
          description: "High-level summary of the lint failure when verdict is rework."
        suggested_fix_focus:
          type: string
          description: "Short summary of what the next repair loop should focus on."
    command:
      cwd_mode: task_root
      program: cargo
      args: ["clippy", "--workspace", "--", "-D", "warnings"]
      timeout_secs: 120

workflows:
  - id: requirement-task-generation
    name: "Requirement Task Generation"
    description: "Create or refine requirement-linked AO tasks through typed mutation tools"
    phases:
      - requirement-task-generation

  - id: requirement-task-generation-run
    name: "Requirement Task Generation + Workflow Start"
    description: "Create or refine requirement-linked tasks, then start workflows for the eligible linked tasks"
    phases:
      - requirement-task-generation
      - requirement-workflow-bootstrap

  - id: triage
    name: "Task Triage"
    description: "Single-phase workflow that evaluates whether a task is still valid"
    phases:
      - triage

  - id: refine
    name: "Refine Requirements"
    description: "Single-phase workflow that refines task descriptions into implementation-ready specs"
    phases:
      - refine-requirements

  - id: ao-task-complete
    name: "AO Task Complete"
    description: "AO project delivery workflow that triages, refines, implements, validates, reviews, and product-signs-off a task to completion"
    phases:
      - triage
      - refine-requirements:
          max_rework_attempts: 2
      - implementation:
          max_rework_attempts: 4
      - unit-test:
          max_rework_attempts: 2
          on_verdict:
            rework:
              target: implementation
      - lint:
          max_rework_attempts: 2
          on_verdict:
            rework:
              target: implementation
      - code-review:
          max_rework_attempts: 3
          on_verdict:
            rework:
              target: implementation
      - po-review:
          max_rework_attempts: 2
          on_verdict:
            rework:
              target: refine-requirements
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  - id: full
    name: "Full Lifecycle"
    description: "End-to-end: triage, refine requirements, implement, test/lint gates, code review, PO sign-off, merge"
    phases:
      - triage
      - refine-requirements
      - implementation
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - code-review:
          on_verdict:
            rework:
              target: implementation
      - po-review:
          on_verdict:
            rework:
              target: implementation
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  - id: review-cycle
    name: "Review Cycle"
    description: "Reusable review sequence: unit-test, lint, code-review, manual testing gate"
    phases:
      - unit-test
      - lint
      - code-review
      - testing

  - id: quick-fix
    name: "Quick Fix"
    description: "Fast workflow for small bug fixes"
    phases:
      - implementation
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - testing

  - id: standard
    name: "Standard (Custom)"
    description: "Standard workflow: requirements, implementation, unit-test, lint, code-review, manual testing"
    phases:
      - requirements
      - implementation:
          skip_if:
            - "task_type == docs"
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - code-review:
          max_rework_attempts: 3
          on_verdict:
            rework:
              target: implementation
      - testing

  - id: gated
    name: "Gated"
    description: "Full workflow with requirements validation, implementation, deterministic test/lint gates, code review, and PO sign-off"
    phases:
      - requirements
      - implementation
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - code-review:
          on_verdict:
            rework:
              target: implementation
      - po-review:
          on_verdict:
            rework:
              target: requirements

  - id: brain
    name: "Brain Planner"
    description: "Planning workflow that triages and refines current work, then surfaces next requirement and task candidates"
    phases:
      - triage
      - refine-requirements
      - brain-requirement-scan
      - brain-task-next

  - id: work-planner
    name: "Work Planner"
    description: "Scans tasks, validates eligibility and dependencies, and enqueues ready work for daemon dispatch"
    phases:
      - work-planning

  - id: task-reconciler
    name: "Task Reconciler"
    description: "Detects and fixes task state inconsistencies: stale tasks, resolved gates, completed projections"
    phases:
      - task-reconciliation

schedules:
  - id: work-planner
    cron: "*/5 * * * *"
    workflow_ref: work-planner
    enabled: true

  - id: task-reconciler
    cron: "*/10 * * * *"
    workflow_ref: task-reconciler
    enabled: true
