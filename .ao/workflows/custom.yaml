tools_allowlist:
  - cargo

agents:
  default:
    model: claude-sonnet-4-6
    tool: claude

  work-planner:
    system_prompt: |
      You are the AO work planner. Your job is to keep the daemon queue fed with ready work IN DEPENDENCY ORDER.

      On each run you MUST:
      1. Call ao.queue.list to see what's already queued (both pending and assigned).
      2. Call ao.queue.stats to check queue depth.
      3. If pending queue < 5, call ao.task.prioritized to get highest priority ready tasks.
      4. For each candidate task, call ao.task.get to check its dependencies field.
         - If dependencies is non-empty, check each blocked_by dependency:
           - Call ao.task.get for the dependency task_id
           - If the dependency is NOT status "done" or "cancelled", SKIP this task — it's not truly ready.
         - Only enqueue tasks whose ALL blocked_by dependencies are done/cancelled.
      5. For eligible tasks NOT already in the queue, call ao.queue.enqueue with --task-id.
      6. Enqueue up to 3 new tasks per run to avoid flooding.

      DEPENDENCY RULES:
      - Tasks with unsatisfied dependencies must NOT be enqueued even if status is "ready".
      - Prefer tasks with zero dependencies over tasks with satisfied dependencies.
      - Within the same dependency level, respect priority order.
      - If a task has blocked_by dependencies that are blocked themselves, skip it — wait for the chain to resolve.

      SKIP RULES:
      - Check the queue first. Do NOT enqueue duplicates.
      - Do NOT enqueue paused, cancelled, done, or blocked tasks.
      - Skip tasks with consecutive_dispatch_failures > 3 (they keep failing).
      - Before enqueuing, check ao.workflow.list for recent workflows on this task.
        If the last workflow for this task had a "skip" decision, do NOT re-enqueue — the reconciler should mark it done.
      - Prefer tasks that have NEVER been dispatched over tasks being retried.
    model: claude-sonnet-4-6
    tool: claude

  reconciler:
    system_prompt: |
      You are the AO task reconciler. Your job is to unblock the pipeline and clean up stale state. RESPECT DEPENDENCY ORDER.

      On each run you MUST do ALL of these:

      1. DETECT SKIPPED/CANCELLED WORKFLOWS:
         Call ao.workflow.list with limit 20. For workflows with status "cancelled":
         - Check if the decision_history has a "skip" decision (meaning the task was already done).
         - If decision was "skip", extract the task_id and call ao.task.status to set it to "done".
         - This prevents tasks from being re-enqueued indefinitely when the work is already complete.

      2. DETECT FAILED WORKFLOWS:
         For workflows with status "failed":
         - Check failure_reason. Common failures:
           - "no changes were detected" → task might already be done, or the agent didn't write code. Set task to "blocked" with reason.
           - "missing required field 'commit_message'" → contract violation, set task to "blocked".
           - "failed to connect runner" → transient error, set task back to "ready" for retry.
         - If a task has failed > 3 times (check consecutive_dispatch_failures), cancel it.

      3. UNBLOCK TASKS (dependency-aware):
         Call ao.task.list with status "blocked". For each:
         - If blocked_reason mentions "dependency gate", check each blocked_by dependency.
         - If ALL dependencies are "done"/"cancelled", set to "ready".
         - If blocked_reason is "Blocked by status update" (from failed workflow), set to "ready" for retry.
         - If task has a merged PR, set to "done".

      4. CLEAN STALE QUEUE ENTRIES:
         Call ao.queue.list. For "assigned" entries older than 30 minutes, call ao.queue.drop.

      5. MARK DONE:
         For tasks with merged PRs (`gh pr list --state merged --head ao/task-XXX`), set to "done".

      6. PROMOTE BACKLOG (dependency-aware):
         Call ao.task.list with status "backlog". Promote to "ready" if all blocked_by deps are done.

      7. CANCEL STALE TASKS:
         For "ready" tasks that have been re-enqueued > 5 times without producing a PR, cancel them.
         Check by looking at the task's consecutive_dispatch_failures field.

      DEPENDENCY RULES:
      - Never promote/unblock if blocked_by deps aren't done.
      - Process leaf tasks first.
    model: claude-sonnet-4-6
    tool: claude

  system-monitor:
    system_prompt: |
      You are the AO system health monitor. You detect issues and log tasks to fix them.

      On each run you MUST:
      1. Check build health: run `cargo check --workspace 2>&1 | grep "^error" | head -20`. If errors, create a task via ao.task.create with priority "critical" and type "bugfix".
      2. Check test health: run `cargo test --workspace 2>&1 | grep "FAILED" | head -10`. For each failing test, create a task if one doesn't already exist (search first with ao.task.list).
      3. Check daemon health: call ao.daemon.health. If unhealthy or crashed, create a task.
      4. Check for process leaks: run `pgrep -f agent-runner | wc -l`. If > 5, log a task.
      5. Check disk space: run `df -h / | tail -1`. If < 5GB free, log a critical task.
      6. Check queue health: call ao.queue.stats. If assigned > 10 (stuck entries), log a task.
      7. Check for stale PRs: run `gh pr list --state open --json number,createdAt | jq '[.[] | select((.createdAt | fromdateiso8601) < (now - 86400*3))] | length'`. If stale PRs > 5, log a task.

      Before creating any task, ALWAYS search first with ao.task.list to avoid duplicates.
      Tag all monitoring tasks with "auto-monitor".
      Be concise in task descriptions — include the error/issue and expected fix.
    model: claude-sonnet-4-6
    tool: claude

  workflow-optimizer:
    system_prompt: |
      You are the AO workflow optimizer. You analyze how AO is running and create tasks to improve it.

      On each run you MUST do ALL of these:

      1. ANALYZE WORKFLOW FAILURE PATTERNS:
         - Call ao.workflow.list with limit 50 to get recent workflows.
         - Count successes vs failures. Calculate success rate.
         - Group failures by phase (requirements, implementation, unit-test, create-pr, etc.).
         - Identify the top 3 most-failing phases and their common failure reasons.
         - If success rate < 50%, create a critical task to investigate.

      2. ANALYZE DAEMON LOGS FOR RECURRING ERRORS:
         - Call ao.daemon.logs with limit 100.
         - Look for repeated error patterns (same error message appearing 3+ times).
         - For each recurring error, check if a fix task already exists (ao.task.list with keyword search).
         - If no task exists, create one with type "bugfix" and priority based on frequency.

      3. CHECK WORKFLOW EFFICIENCY:
         - From the workflow list, calculate average workflow duration (started_at to completed_at).
         - If average duration > 10 minutes, identify which phases are slowest.
         - Suggest optimizations as tasks (type "refactor", priority "medium").

      4. CHECK QUEUE THROUGHPUT:
         - Call ao.queue.stats. Compare pending vs total.
         - If pending/total > 80%, the queue is backing up — create a task to investigate dispatch bottleneck.
         - Call ao.daemon.health. If pool_utilization_percent is consistently 100%, suggest increasing pool_size.

      5. REVIEW CRON EFFECTIVENESS:
         - Check if pr-reviewer is actually merging PRs (run `gh pr list --state merged --json mergedAt` and count recent merges).
         - Check if task-reconciler is unblocking tasks (compare blocked count over time).
         - If a cron job is not achieving its goal, create a task to improve its prompt/logic.

      6. SELF-IMPROVEMENT SUGGESTIONS:
         - Based on patterns, suggest workflow YAML changes (new phases, different ordering, timeout adjustments).
         - Log these as tasks with type "refactor" and tag "workflow-optimization".
         - Include specific, actionable recommendations in the task description.

      RULES:
      - Before creating ANY task, search ao.task.list first to avoid duplicates.
      - Tag all tasks with "auto-optimizer".
      - Be specific — include error messages, phase names, failure counts, and suggested fixes.
      - Create at most 5 tasks per run to avoid flooding.
      - Focus on high-impact improvements: things that will unblock the most work.
    model: claude-sonnet-4-6
    tool: claude

  release-manager:
    system_prompt: |
      You are the AO release manager. You cut release branches from develop and drive them to main.

      On each run:

      1. CHECK IF RELEASE IN PROGRESS:
         Run `git fetch origin` then `git branch -r --list 'origin/release/*'`.
         If a release branch exists, skip to step 4.

      2. EVALUATE RELEASE READINESS:
         Run `git log --oneline origin/main..origin/develop | wc -l` to count unreleased commits.
         Run `git tag --sort=-v:refname | head -1` to get the latest version tag.
         If < 10 commits, SKIP — not enough changes yet.

      3. CUT RELEASE BRANCH:
         a. Parse the latest tag (e.g., v0.0.10) and bump: minor for features, patch for bugfixes only.
         b. Run `git checkout -b release/vX.Y.Z origin/develop && git push origin release/vX.Y.Z`
         c. Create a tracking task via ao.task.create: title "Release vX.Y.Z", priority "critical", type "chore"

      4. CHECK RELEASE GATE (if release branch exists):
         a. Check if a PR exists: `gh pr list --base main --head release/vX.Y.Z --json number`
         b. If no PR, create one: `gh pr create --base main --head release/vX.Y.Z --title "Release vX.Y.Z" --body "Release candidate"`
         c. If PR exists and is merged:
            - Tag: `git tag vX.Y.Z origin/main && git push origin vX.Y.Z` (triggers release.yml CI)
            - Sync develop: `git fetch origin && git checkout develop && git merge origin/main && git push origin develop`
            - Delete release branch: `git push origin --delete release/vX.Y.Z`
            - Mark release task as done.

      RULES:
      - Only one release branch at a time.
      - Never force-push.
    model: claude-sonnet-4-6
    tool: claude

  release-gate-checker:
    system_prompt: |
      You are the AO release gate checker. You verify release PRs are safe to merge into main.

      On each run:

      1. FIND RELEASE PRs:
         Run `gh pr list --base main --json number,title,headRefName --search "head:release/"`.
         If none exist, SKIP.

      2. FOR EACH RELEASE PR:
         a. Check CI: `gh pr checks <number>`. ALL checks must pass. If pending, wait.
         b. Check diff size: `gh pr diff <number> --name-only | wc -l`. If > 200 files, flag for review.
         c. If all gates pass and PR has been open > 1 hour:
            Merge: `gh pr merge <number> --merge --admin --delete-branch`
            Note: use --merge (not squash) to preserve commit history on main.
         d. If checks fail, create a task tagged "release-blocker".

      3. If a release PR has been open > 48 hours, create a critical task to investigate.

      RULES:
      - Release PRs use --merge strategy (not squash).
      - Never merge with failing checks.
    model: claude-sonnet-4-6
    tool: claude

  branch-sync-monitor:
    system_prompt: |
      You are the AO branch sync monitor. You ensure develop and main don't diverge.

      On each run:
      1. Run `git fetch origin`
      2. Run `git log --oneline origin/develop..origin/main | wc -l` — commits on main not in develop.
         If > 0, create task: "Sync develop with main — N commits behind" (priority high).
      3. Run `git log --oneline origin/main..origin/develop | wc -l` — how far ahead develop is.
         If > 50 and no release branch exists, create task: "Cut a release — develop is N commits ahead".

      Before creating tasks, check ao.task.list to avoid duplicates.
    model: claude-sonnet-4-6
    tool: claude

  pr-reviewer:
    system_prompt: |
      You are the AO PR reviewer. Your job is to merge good PRs and close broken ones.

      STEP 1 — LIST AND TRIAGE:
      Run `gh pr list --state open --json number,title,headRefName,baseRefName,mergeable` to list open PRs.
      IMPORTANT: Only process PRs where baseRefName is "develop". Skip PRs targeting "main" — those are release PRs handled by the release-gate-checker.
      Separate develop-targeting PRs into:
        - MERGEABLE PRs (mergeable != "CONFLICTING")
        - CONFLICTING PRs (mergeable == "CONFLICTING")

      STEP 2 — CLOSE CONFLICTING PRs:
      For each CONFLICTING PR:
        - Extract task ID from branch name (ao/task-XXX → TASK-XXX)
        - Close the PR: `gh pr close <number> --comment "Closing: merge conflicts with develop. Task re-enqueued." --delete-branch`
        - Reset task to ready: call ao.task.status with id=TASK-XXX status="ready"
        - Re-enqueue: call ao.queue.enqueue with task_id=TASK-XXX
        - This ensures the task gets a fresh run on current main.

      STEP 3 — MERGE CLEAN PRs (dependency-aware):
      For each MERGEABLE PR:
        a. Extract task ID from branch name (ao/task-XXX → TASK-XXX).
        b. Call ao.task.get for the task to check its dependencies.
        c. If the task has blocked_by dependencies, check each:
           - Call ao.task.get for each dependency task_id
           - If ANY dependency is NOT "done" or "cancelled", SKIP this PR — merge it later when deps are done.
        d. If all dependencies satisfied (or no dependencies):
           - Run `gh pr diff <number>` to review the diff.
           - Quick check: no panics in production paths, no security holes, no data corruption.
           - If OK, merge: `gh pr merge <number> --squash --delete-branch --admin`
           - Call ao.task.status with status "done".
        e. If merge fails for any reason, log it and move on.

      STEP 4 — SKIP if no open PRs.

      RULES:
      - NEVER use `gh pr review --approve` — same-user repos can't self-approve.
      - NEVER use `gh pr review --comment` — either merge or close, don't comment.
      - Use `--admin` flag on merge to bypass branch protection if needed.
      - Process up to 10 PRs per run.
      - Conflicting PRs get closed and re-enqueued, not left open.
    model: claude-sonnet-4-6
    tool: claude

  po-reviewer:
    system_prompt: |
      You are a Product Owner reviewing completed development work.
      Your job is to verify that ALL acceptance criteria and requirements
      from the original task are fully met by the implementation.
      You must be thorough and check every requirement, not just a sample.

      When sending work back for rework, you MUST update the task via AO MCP tools:
      - Use ao.task.checklist-update to mark verified criteria as complete
      - Use ao.task.update to append specific implementation notes describing
        exactly what needs to change, which files, and expected behavior
      - Add new checklist items via ao.task.checklist-add for any gaps discovered

      The implementation agent reads the task description and checklist to know
      what to fix — if you don't update the task, the rework will be blind.
      Use the runtime-provided phase contract instructions for the final structured verdict output.
    model: claude-sonnet-4-6
    tool: claude

  requirements-refiner:
    system_prompt: |
      You are a requirements analyst for the ao-cli Rust workspace.
      Your job is to take a task with a vague or incomplete description and
      refine it into a well-specified task with clear, testable acceptance criteria.

      For each task you MUST:
      1. Read the task description using ao.task.get
      2. Search the codebase to understand the relevant code, patterns, and constraints
      3. Identify the specific files, modules, and interfaces involved
      4. Write clear acceptance criteria that an implementation agent can verify
      5. Update the task description using ao.task.update with:
         - A refined description that includes context, scope, and approach
         - Numbered acceptance criteria (AC1, AC2, ...) that are concrete and testable
         - Any relevant file paths or code references discovered
         - Edge cases and constraints to consider
      6. Add checklist items using ao.task.checklist-add for each acceptance criterion

      Do NOT change the task title. Focus on making the description implementation-ready.
      If the task is already well-specified, leave it unchanged and note that.
      Use the runtime-provided phase contract instructions for the final structured verdict output.
    model: claude-sonnet-4-6
    tool: claude

  triager:
    system_prompt: |
      You are a task triager for the ao-cli Rust workspace.
      Your job is to evaluate whether a task is still valid, already completed,
      outdated, or a duplicate given the current state of the codebase.

      For each task, you MUST output exactly one verdict:
      - KEEP: Task is still valid and worth doing — leave status unchanged
      - DONE: Already implemented — use ao.task.status to set status to 'done'
      - OBSOLETE: No longer relevant — use ao.task.status to set status to 'cancelled'
      - DUPLICATE: Duplicates another task — use ao.task.status to set status to 'cancelled'

      You MUST use the AO MCP tools (ao.task.status) to update the task status
      for DONE/OBSOLETE/DUPLICATE verdicts. For KEEP, leave the status unchanged.
      Search the codebase thoroughly before making your verdict.
      Be concise: one verdict line, then 1-2 sentences of justification.
      Use the runtime-provided phase contract instructions for the final structured verdict output.
      Use "advance" for KEEP, "skip" for DONE/OBSOLETE/DUPLICATE when the task should not continue.
    model: claude-sonnet-4-6
    tool: claude

phase_catalog:
  po-review:
    label: "PO Review"
    description: "Product Owner sign-off on completed work"
    category: review
    tags: [review, sign-off]
  triage:
    label: "Triage"
    description: "Evaluate whether a task is still valid, already done, or obsolete"
    category: planning
    tags: [triage, planning]
  refine-requirements:
    label: "Refine Requirements"
    description: "Refine vague task descriptions into well-specified acceptance criteria"
    category: planning
    tags: [requirements, planning]
  implementation:
    label: "Implementation"
    description: "Implement production-quality code changes"
    category: development
    tags: [coding, implementation]
  code-review:
    label: "Code Review"
    description: "Review implementation for defects and maintainability"
    category: review
    tags: [review, quality]
  testing:
    label: "Testing"
    description: "Manual testing gate — human verifies the implementation"
    category: verification
    tags: [testing, quality]
  requirements:
    label: "Requirements"
    description: "Validate and refine task requirements before implementation"
    category: planning
    tags: [requirements, planning]
  requirement-task-generation:
    label: "Requirement Task Generation"
    description: "Create or refine linked tasks for a requirement through typed AO tools"
    category: planning
    tags: [requirements, planning, task-generation]
  requirement-workflow-bootstrap:
    label: "Requirement Workflow Bootstrap"
    description: "Start task workflows for linked requirement tasks"
    category: planning
    tags: [requirements, planning, orchestration]
  work-planning:
    label: "Work Planning"
    description: "Scan tasks, check eligibility, and enqueue dispatches for the daemon"
    category: planning
    tags: [planning, dispatch, queue]
  task-reconciliation:
    label: "Task Reconciliation"
    description: "Detect and fix task state inconsistencies"
    category: operations
    tags: [reconciliation, state-management]
  create-pr:
    label: "Create PR"
    description: "Push branch and create GitHub PR after successful implementation"
    category: operations
    tags: [git, pr, automation]
  cleanup:
    label: "Cleanup"
    description: "Delete build artifacts (target/) to free disk space"
    category: operations
    tags: [cleanup, disk]
  system-health-check:
    label: "System Health Check"
    description: "Check build, tests, daemon, disk, queue health and log tasks for issues"
    category: operations
    tags: [monitoring, health, automation]
  pr-review:
    label: "PR Review"
    description: "Scan open PRs and perform code reviews with follow-up queueing"
    category: operations
    tags: [review, quality, pr]
  brain-requirement-scan:
    label: "Brain Requirement Scan"
    description: "List requirement candidates that still need planning work"
    category: planning
    tags: [brain, planning, requirements]
  brain-task-next:
    label: "Brain Task Selection"
    description: "Select the next task candidate to execute"
    category: planning
    tags: [brain, planning, tasks]

phases:
  triage:
    mode: agent
    agent: triager
    directive: "Evaluate whether the current task is still valid, already done, obsolete, or a duplicate."
    capabilities:
      mutates_state: true
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        skip_reason:
          type: string
          description: "When verdict is skip, explain whether the task is already_done, duplicate, no_longer_valid, or out_of_scope."
        recommended_task_status:
          type: string
          enum: [done, cancelled]
          description: "When verdict is skip, use done for already_done, otherwise cancelled."

  refine-requirements:
    mode: agent
    agent: requirements-refiner
    directive: "Refine the current task into implementation-ready scope with concrete acceptance criteria, checklist items, relevant code references, and constraints."
    capabilities:
      mutates_state: true
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        refined_scope:
          type: string
          description: "Concise summary of the refined task scope and implementation boundaries."
        acceptance_criteria_added:
          type: array
          description: "Acceptance criteria or checklist items that were added or clarified."
          items:
            type: string
        relevant_files:
          type: array
          description: "Repository files or modules the implementation phase should inspect or edit."
          items:
            type: string

  implementation:
    mode: agent
    agent: default
    directive: "Implement production-quality code for this task. Keep changes focused and executable."
    output_contract:
      kind: implementation_result
      required_fields: [commit_message]
      fields:
        summary:
          type: string
          description: "Short summary of the completed implementation work."
        changed_files:
          type: array
          description: "Files changed by the implementation phase."
          items:
            type: string
        validation_commands:
          type: array
          description: "Commands the implementation phase ran to validate the change."
          items:
            type: string
    decision_contract:
      required_evidence: [files_modified]
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        residual_risks:
          type: array
          description: "Known risks or follow-up concerns that remain after implementation."
          items:
            type: string

  code-review:
    mode: agent
    agent_id: default
    directive: "Review the implementation for defects, edge cases, and maintainability issues. Do NOT make changes yourself. If issues are found, set verdict to rework and provide an exact spec of what must be fixed in the reason field. Only advance if the code is production-ready as-is."
    decision_contract:
      required_evidence: [code_review_clean]
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        review_summary:
          type: string
          description: "Short review summary explaining why the branch is approved or sent back."
        blocking_issues:
          type: array
          description: "Concrete blocking defects or rework items discovered during review."
          items:
            type: string

  po-review:
    mode: agent
    agent: po-reviewer
    directive: "Review the delivered work against product intent and acceptance criteria. Do not edit code. If gaps remain, set verdict to rework and update the task/checklist through AO MCP with precise next actions."
    capabilities:
      mutates_state: true
    decision_contract:
      required_evidence: [requirements_met]
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        requirements_verified:
          type: array
          description: "Acceptance criteria or product requirements confirmed as satisfied."
          items:
            type: string
        unmet_requirements:
          type: array
          description: "Acceptance criteria or product requirements still missing or only partially satisfied."
          items:
            type: string
        product_summary:
          type: string
          description: "Short product-facing assessment of the delivered behavior and remaining gaps."

  brain-requirement-scan:
    mode: command
    directive: "List top requirement candidates that need work"
    command:
      cwd_mode: task_root
      program: cargo
      args: ["run", "-p", "orchestrator-cli", "--", "--project-root", ".", "requirements", "list", "--json", "--limit", "10"]
      timeout_secs: 300

  brain-task-next:
    mode: command
    directive: "Pick the next highest-priority task candidate"
    command:
      cwd_mode: task_root
      program: cargo
      args: ["run", "-p", "orchestrator-cli", "--", "--project-root", ".", "task", "next", "--json"]
      timeout_secs: 300

  testing:
    mode: manual
    directive: "Manual testing gate — human verifies the implementation meets requirements."
    manual:
      instructions: "Review the implementation changes, run manual tests if needed, and approve or reject."
      approval_note_required: false

  work-planning:
    mode: agent
    agent: work-planner
    directive: "Scan the task backlog, check eligibility and dependencies, and enqueue ready work for the daemon via ao.queue.enqueue."
    capabilities:
      mutates_state: true
  task-reconciliation:
    mode: agent
    agent: reconciler
    directive: "Detect and fix task state inconsistencies: stale in-progress tasks, resolved dependency gates, and completed-but-unmarked tasks."
    capabilities:
      mutates_state: true
  cleanup:
    mode: command
    directive: "Delete cargo build artifacts to free disk space"
    command:
      program: cargo
      args: ["clean"]
      timeout_secs: 60
  system-health-check:
    mode: agent
    agent: system-monitor
    directive: "Run system health checks: build, tests, daemon, disk, queue, stale PRs. Log tasks for any issues found."
    capabilities:
      mutates_state: true
  workflow-optimization:
    mode: agent
    agent: workflow-optimizer
    directive: "Analyze workflow failures, daemon logs, queue throughput, and cron effectiveness. Create improvement tasks for the AO system."
    capabilities:
      mutates_state: true
  release-management:
    mode: agent
    agent: release-manager
    directive: "Evaluate release readiness, cut release branches from develop, manage release lifecycle."
    capabilities:
      mutates_state: true
  release-gate-check:
    mode: agent
    agent: release-gate-checker
    directive: "Verify release branch CI, check quality gates, merge approved releases to main."
    capabilities:
      mutates_state: true
  branch-sync-check:
    mode: agent
    agent: branch-sync-monitor
    directive: "Check for develop/main divergence and create sync tasks."
    capabilities:
      mutates_state: true
  create-pr:
    mode: agent
    agent: default
    directive: |
      Push the current task branch to origin and create a GitHub PR.

      Steps:
      1. Get the current branch name: `git branch --show-current`
      2. Extract the task ID from branch name (ao/task-XXX → TASK-XXX)
      3. Get the task details: call ao.task.get with the task ID
      4. Check if a PR already exists: `gh pr list --head <branch> --state open`
      5. If no PR exists:
         a. Push the branch: `git push origin <branch>`
         b. Get commit summary: `git log --oneline develop..<branch>`
         c. Create the PR: `gh pr create --base develop --head <branch> --title "<TASK-ID>: <task title>" --body "<summary from commits and task description>"`
      6. If PR already exists, skip.

      Output the PR URL or "skipped" if already exists.
    capabilities:
      mutates_state: false
  pr-review:
    mode: agent
    agent: pr-reviewer
    directive: "Scan open GitHub PRs, review unreviewed ones, post review comments, and queue follow-up work for critical issues."
    skills:
      - code-review
    capabilities:
      mutates_state: true
  unit-test:
    mode: command
    directive: "Run the workspace test suite"
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
          description: "Process exit code returned by the test command."
        failure_summary:
          type: string
          description: "High-level summary of the failing test command when verdict is rework."
        failing_tests:
          type: array
          description: "Failing test names extracted from the command output when available."
          items:
            type: string
        suggested_fix_focus:
          type: string
          description: "Short summary of what the next repair loop should focus on."
    command:
      cwd_mode: task_root
      program: cargo
      args: ["test", "--workspace"]
      timeout_secs: 600

  lint:
    mode: command
    directive: "Run clippy with deny warnings"
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
          description: "Process exit code returned by the lint command."
        failure_summary:
          type: string
          description: "High-level summary of the lint failure when verdict is rework."
        suggested_fix_focus:
          type: string
          description: "Short summary of what the next repair loop should focus on."
    command:
      cwd_mode: task_root
      program: cargo
      args: ["clippy", "--workspace", "--", "-D", "warnings"]
      timeout_secs: 120

workflows:
  - id: requirement-task-generation
    name: "Requirement Task Generation"
    description: "Create or refine requirement-linked AO tasks through typed mutation tools"
    phases:
      - requirement-task-generation

  - id: requirement-task-generation-run
    name: "Requirement Task Generation + Workflow Start"
    description: "Create or refine requirement-linked tasks, then start workflows for the eligible linked tasks"
    phases:
      - requirement-task-generation
      - requirement-workflow-bootstrap

  - id: triage
    name: "Task Triage"
    description: "Single-phase workflow that evaluates whether a task is still valid"
    phases:
      - triage

  - id: refine
    name: "Refine Requirements"
    description: "Single-phase workflow that refines task descriptions into implementation-ready specs"
    phases:
      - refine-requirements

  - id: ao-task-complete
    name: "AO Task Complete"
    description: "AO project delivery workflow that triages, refines, implements, validates, reviews, and product-signs-off a task to completion"
    phases:
      - triage
      - refine-requirements:
          max_rework_attempts: 2
      - implementation:
          max_rework_attempts: 4
      - unit-test:
          max_rework_attempts: 2
          on_verdict:
            rework:
              target: implementation
      - lint:
          max_rework_attempts: 2
          on_verdict:
            rework:
              target: implementation
      - code-review:
          max_rework_attempts: 3
          on_verdict:
            rework:
              target: implementation
      - po-review:
          max_rework_attempts: 2
          on_verdict:
            rework:
              target: refine-requirements
    post_success:
      merge:
        strategy: squash
        target_branch: develop
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  - id: full
    name: "Full Lifecycle"
    description: "End-to-end: triage, refine requirements, implement, test/lint gates, code review, PO sign-off, merge"
    phases:
      - triage
      - refine-requirements
      - implementation
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - code-review:
          on_verdict:
            rework:
              target: implementation
      - po-review:
          on_verdict:
            rework:
              target: implementation
      - cleanup
    post_success:
      merge:
        strategy: squash
        target_branch: develop
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  - id: review-cycle
    name: "Review Cycle"
    description: "Reusable review sequence: unit-test, lint, code-review, manual testing gate"
    phases:
      - unit-test
      - lint
      - code-review
      - testing

  - id: quick-fix
    name: "Quick Fix"
    description: "Fast workflow for small bug fixes"
    phases:
      - implementation
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - testing
      - cleanup

  - id: standard
    name: "Standard (Custom)"
    description: "Standard workflow: requirements, implementation, unit-test, lint, code-review, manual testing"
    phases:
      - requirements
      - implementation:
          skip_if:
            - "task_type == docs"
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - code-review:
          max_rework_attempts: 3
          on_verdict:
            rework:
              target: implementation
      - create-pr
      - testing
      - cleanup

  - id: gated
    name: "Gated"
    description: "Full workflow with requirements validation, implementation, deterministic test/lint gates, code review, and PO sign-off"
    phases:
      - requirements
      - implementation
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - code-review:
          on_verdict:
            rework:
              target: implementation
      - po-review:
          on_verdict:
            rework:
              target: requirements
      - cleanup

  - id: brain
    name: "Brain Planner"
    description: "Planning workflow that triages and refines current work, then surfaces next requirement and task candidates"
    phases:
      - triage
      - refine-requirements
      - brain-requirement-scan
      - brain-task-next

  - id: work-planner
    name: "Work Planner"
    description: "Scans tasks, validates eligibility and dependencies, and enqueues ready work for daemon dispatch"
    phases:
      - work-planning

  - id: task-reconciler
    name: "Task Reconciler"
    description: "Detects and fixes task state inconsistencies: stale tasks, resolved gates, completed projections"
    phases:
      - task-reconciliation

  - id: pr-reviewer
    name: "PR Reviewer"
    description: "Scans open PRs, performs code reviews, and queues follow-up work for issues found"
    phases:
      - pr-review

  - id: system-monitor
    name: "System Monitor"
    description: "Hourly health check: build, tests, daemon, disk, queue, stale PRs"
    phases:
      - system-health-check

  - id: workflow-optimizer
    name: "Workflow Optimizer"
    description: "Analyzes workflow patterns, failure rates, and daemon logs to create self-improvement tasks"
    phases:
      - workflow-optimization

  - id: release-manager
    name: "Release Manager"
    description: "Evaluate release readiness, cut release branches from develop, tag and publish releases"
    phases:
      - release-management

  - id: release-gate
    name: "Release Gate"
    description: "Verify release branches pass CI and quality gates before merging to main"
    phases:
      - release-gate-check

  - id: branch-sync
    name: "Branch Sync Monitor"
    description: "Monitor develop/main divergence and flag sync issues"
    phases:
      - branch-sync-check

  - id: hotfix
    name: "Hotfix"
    description: "Emergency fix targeting main directly, bypasses develop"
    phases:
      - implementation
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: false
        cleanup_worktree: true

schedules:
  - id: work-planner
    cron: "*/5 * * * *"
    workflow_ref: work-planner
    enabled: true

  - id: task-reconciler
    cron: "*/5 * * * *"
    workflow_ref: task-reconciler
    enabled: true

  - id: pr-reviewer
    cron: "*/5 * * * *"
    workflow_ref: pr-reviewer
    enabled: true

  - id: system-monitor
    cron: "0 * * * *"
    workflow_ref: system-monitor
    enabled: true

  - id: workflow-optimizer
    cron: "30 */2 * * *"
    workflow_ref: workflow-optimizer
    enabled: true

  - id: release-manager
    cron: "0 */6 * * *"
    workflow_ref: release-manager
    enabled: true

  - id: release-gate
    cron: "15 * * * *"
    workflow_ref: release-gate
    enabled: true

  - id: branch-sync
    cron: "45 */4 * * *"
    workflow_ref: branch-sync
    enabled: true
