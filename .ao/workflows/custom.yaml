        target_branch: develop
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  - id: standard-minimax
    name: "Standard (MiniMax)"
    description: "Implement → Push → PR fast with MiniMax"
    phases:
      - minimax-requirements
      - minimax-implementation:
          skip_if:
            - "task_type == docs"
      - push-branch
      - create-pr
      - cleanup
    post_success:
      merge:
        strategy: squash
        target_branch: develop
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  - id: standard-kimi
