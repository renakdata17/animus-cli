phases:
  triage:
    mode: agent
    agent: triager
    directive: Validate the task (check if done/duplicate/obsolete) and if valid, dispatch to the right implementation workflow
      via ao.queue.enqueue.
    capabilities:
      mutates_state: true
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        skip_reason:
          type: string
          description: When verdict is skip, explain whether the task is already_done, duplicate, no_longer_valid, or out_of_scope.
        recommended_task_status:
          type: string
          enum:
          - done
          - cancelled
          description: When verdict is skip, use done for already_done, otherwise cancelled.
  refine-requirements:
    mode: agent
    agent: requirement-refiner
    directive: Refine the current task into implementation-ready scope with concrete acceptance criteria, checklist items,
      relevant code references, and constraints.
    capabilities:
      mutates_state: true
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        refined_scope:
          type: string
          description: Concise summary of the refined task scope and implementation boundaries.
        acceptance_criteria_added:
          type: array
          description: Acceptance criteria or checklist items that were added or clarified.
          items:
            type: string
        relevant_files:
          type: array
          description: Repository files or modules the implementation phase should inspect or edit.
          items:
            type: string
  implementation:
    mode: agent
    agent: default
    directive: Implement production-quality code for this task. Keep changes focused and executable.
    output_contract:
      kind: implementation_result
      required_fields:
      - commit_message
      fields:
        summary:
          type: string
          description: Short summary of the completed implementation work.
        changed_files:
          type: array
          description: Files changed by the implementation phase.
          items:
            type: string
        validation_commands:
          type: array
          description: Commands the implementation phase ran to validate the change.
          items:
            type: string
    decision_contract:
      required_evidence:
      - files_modified
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        residual_risks:
          type: array
          description: Known risks or follow-up concerns that remain after implementation.
          items:
            type: string
  code-review:
    mode: agent
    agent: codex-default
    directive: Review the implementation for defects, edge cases, and maintainability issues. Do NOT make changes yourself.
      If issues are found, set verdict to rework and provide an exact spec of what must be fixed in the reason field. Only
      advance if the code is production-ready as-is.
    decision_contract:
      required_evidence:
      - code_review_clean
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        review_summary:
          type: string
          description: Short review summary explaining why the branch is approved or sent back.
        blocking_issues:
          type: array
          description: Concrete blocking defects or rework items discovered during review.
          items:
            type: string
  po-review:
    mode: agent
    agent: po-reviewer
    directive: Review the delivered work against product intent and acceptance criteria. Do not edit code. If gaps remain,
      set verdict to rework and update the task/checklist through AO MCP with precise next actions.
    capabilities:
      mutates_state: true
    decision_contract:
      required_evidence:
      - requirements_met
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        requirements_verified:
          type: array
          description: Acceptance criteria or product requirements confirmed as satisfied.
          items:
            type: string
        unmet_requirements:
          type: array
          description: Acceptance criteria or product requirements still missing or only partially satisfied.
          items:
            type: string
        product_summary:
          type: string
          description: Short product-facing assessment of the delivered behavior and remaining gaps.
  testing:
    mode: manual
    directive: "Manual testing gate \u2014 human verifies the implementation meets requirements."
    manual:
      instructions: Review the implementation changes, run manual tests if needed, and approve or reject.
      approval_note_required: false
  work-planning:
    mode: agent
    agent: work-planner
    directive: Scan the task backlog, check eligibility and dependencies, and enqueue ready work for the daemon via ao.queue.enqueue.
    capabilities:
      mutates_state: true
  task-reconciliation:
    mode: agent
    agent: reconciler
    directive: 'Detect and fix task state inconsistencies: stale in-progress tasks, resolved dependency gates, and completed-but-unmarked
      tasks.'
    capabilities:
      mutates_state: true
  cleanup:
    mode: command
    directive: Delete cargo build artifacts to free disk space
    command:
      cwd_mode: task_root
      program: cargo
      args:
      - clean
      timeout_secs: 60
  push-branch:
    mode: command
    directive: Push the current branch to origin
    command:
      program: git
      args:
      - push
      - -u
      - origin
      - HEAD
      cwd_mode: task_root
      timeout_secs: 60
      success_exit_codes:
      - 0
      - 1
      - 128
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
  create-pr:
    mode: command
    directive: Create a GitHub PR from the current branch to develop
    command:
      program: gh
      args:
      - pr
      - create
      - --fill
      - --base
      - develop
      cwd_mode: task_root
      timeout_secs: 60
      success_exit_codes:
      - 0
      - 1
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
  force-push:
    mode: command
    directive: Force push rebased branch
    command:
      program: git
      args:
      - push
      - --force-with-lease
      - origin
      - HEAD
      cwd_mode: task_root
      timeout_secs: 60
      success_exit_codes:
      - 0
      - 1
      - 128
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
  sync-main:
    mode: command
    directive: Pull latest origin/main into project root
    command:
      program: git
      args:
      - pull
      - origin
      - main
      - --ff-only
      timeout_secs: 30
      success_exit_codes:
      - 0
      - 1
      - 128
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
  rebase-on-main:
    mode: agent
    agent: default
    directive: "This branch has merge conflicts with its base branch. Rebase it.\nThe base branch is provided in dispatch_input\
      \ as \"base\" (e.g. \"develop\" or \"main\").\nIf no base is provided, default to \"develop\".\n1. Run: git fetch origin\
      \ {{base}}\n2. Run: git rebase origin/{{base}}\n3. For each conflict, resolve by keeping BOTH sides of changes.\n  \
      \ For Cargo.lock: accept theirs, run cargo build to regenerate.\n   For code files: integrate both changes.\n4. After\
      \ resolving: git add <file>, then git rebase --continue\n5. Run cargo build to verify the project compiles.\n6. If fundamentally\
      \ incompatible, abort with git rebase --abort.\n"
    capabilities:
      mutates_state: true
  address-review:
    mode: agent
    agent: default
    directive: 'A PR reviewer has requested changes. Address the feedback.

      1. Get the task ID from context. Read task via ao.task.get.

      2. Find the PR: gh pr list --state open --head <branch> --json number

      3. Read review comments: gh pr view <number> --json reviews,comments

      4. For each requested change, make the code fix.

      5. After all changes: git add -A && git commit referencing the review.

      6. Verify cargo build passes.

      '
    capabilities:
      mutates_state: true
  unit-test:
    mode: command
    directive: Verify the workspace compiles cleanly
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
          description: Process exit code returned by the build command.
        failure_summary:
          type: string
          description: High-level summary of the build failure when verdict is rework.
        suggested_fix_focus:
          type: string
          description: Short summary of what the next repair loop should focus on.
    command:
      cwd_mode: task_root
      program: cargo
      args:
      - build
      - --workspace
      timeout_secs: 600
      success_exit_codes:
      - 0
  lint:
    mode: command
    directive: Run clippy warnings check
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
          description: Process exit code returned by the lint command.
        failure_summary:
          type: string
          description: High-level summary of the lint failure when verdict is rework.
        suggested_fix_focus:
          type: string
          description: Short summary of what the next repair loop should focus on.
    command:
      cwd_mode: task_root
      program: cargo
      args:
      - check
      - --workspace
      success_exit_codes:
      - 0
      timeout_secs: 120
workflows:
- id: triage
  name: Task Triage
  description: Single-phase workflow that evaluates whether a task is still valid
  phases:
  - triage
- id: refine
  name: Refine Requirements
  description: Single-phase workflow that refines task descriptions into implementation-ready specs
  phases:
  - refine-requirements
- id: standard
  name: Standard
  description: "Implement \u2192 Push \u2192 PR fast. Review separately via pr-reviewer cron."
  phases:
  - requirements
  - implementation:
      skip_if:
      - task_type == docs
  - push-branch
  - create-pr
  - cleanup
- id: quick-fix
  name: Quick Fix
  description: "Implement \u2192 Push \u2192 PR fast"
  phases:
  - implementation
  - push-branch
  - create-pr
  - cleanup
- id: full
  name: Full Lifecycle
  description: "Triage \u2192 Refine \u2192 Implement \u2192 Push \u2192 PR"
  phases:
  - triage
  - refine-requirements
  - implementation
  - push-branch
  - create-pr
  - cleanup
  post_success:
    merge:
      strategy: squash
      target_branch: develop
      create_pr: true
      auto_merge: true
      cleanup_worktree: true
- id: review-cycle
  name: Review Cycle
  description: 'Reusable review sequence: unit-test, lint, code-review, manual testing gate'
  phases:
  - unit-test
  - lint
  - code-review
  - testing
- id: rework
  name: Rework
  description: Address reviewer feedback, push fixes, re-review
  phases:
  - address-review
  - force-push
- id: rebase-and-retry
  name: Rebase and Retry
  description: Rebase conflicting branch on develop, force push
  phases:
  - rebase-on-main
  - force-push
- id: sync-main
  name: Sync Main
  description: Pull latest origin/main into project root
  phases:
  - sync-main
- id: hotfix
  name: Hotfix
  description: "Emergency fix \u2192 Push \u2192 PR targeting main"
  phases:
  - implementation
  - push-branch
  - create-pr
  post_success:
    merge:
      strategy: squash
      target_branch: main
      create_pr: true
      auto_merge: false
      cleanup_worktree: true
- id: ao-task-complete
  name: AO Task Complete
  description: "Triage \u2192 Refine \u2192 Implement \u2192 Push \u2192 PR"
  phases:
  - triage
  - refine-requirements
  - implementation
  - push-branch
  - create-pr
  post_success:
    merge:
      strategy: squash
      target_branch: develop
      create_pr: true
      auto_merge: true
      cleanup_worktree: true
- id: gated
  name: Gated
  description: "Implement \u2192 Push \u2192 PR (same as standard)"
  phases:
  - requirements
  - implementation
  - push-branch
  - create-pr
  - cleanup
- id: requirement-task-generation
  name: Requirement Task Generation
  description: Create or refine requirement-linked AO tasks through typed mutation tools
  phases:
  - requirement-task-generation
- id: requirement-task-generation-run
  name: Requirement Task Generation + Workflow Start
  description: Create or refine requirement-linked tasks, then start workflows for the eligible linked tasks
  phases:
  - requirement-task-generation
  - requirement-workflow-bootstrap
- id: triage
  name: Triage & Dispatch
  description: Validate task, check if done/duplicate, dispatch to the right implementation workflow
  phases:
  - triage
