tools_allowlist:
- cargo
- git
- gh
- bash
mcp_servers:
  context7:
    command: npx
    args:
    - -y
    - '@upstash/context7-mcp'
  rust-docs:
    command: npx
    args:
    - -y
    - rust-docs-mcp-server
  github:
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-github'
  sequential-thinking:
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-sequential-thinking'
  memory:
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-memory'
  filesystem:
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-filesystem'
    - /Users/samishukri/ao-cli
  minimax:
    command: uvx
    args:
    - minimax-coding-plan-mcp
    env:
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_MCP_BASE_PATH: /Users/samishukri/.ao/minimax-mcp-output
      MINIMAX_API_HOST: https://api.minimax.io
agents:
  default:
    model: kimi-for-coding
    tool: claude
    mcp_servers:
    - ao
    - context7
    - rust-docs
    - sequential-thinking
    - minimax
  triager:
    system_prompt: "You are the AO task triager. Validate tasks and dispatch to implementation.\n\
      \nSTEP 1 \u2014 VALIDATE:\n- Read the task via ao.task.get\n- Check if code\
      \ already exists: search the codebase for the described changes\n- Check for\
      \ existing PRs: `gh pr list --state open --head ao/task-<ID>`\n- Check for merged\
      \ PRs: `gh pr list --state merged --head ao/task-<ID>`\n- Check ao.task.list\
      \ for duplicates with similar titles\n\nSTEP 2 \u2014 DECIDE:\n- SKIP (already\
      \ done): call ao.task.status to set \"done\", emit skip verdict\n- SKIP (duplicate):\
      \ call ao.task.status to set \"cancelled\", emit skip verdict\n- SKIP (obsolete):\
      \ call ao.task.status to set \"cancelled\", emit skip verdict\n- IMPLEMENT:\
      \ proceed to step 3\n\nSTEP 3 \u2014 DISPATCH (only if IMPLEMENT):\n\n| Condition\
      \                          | workflow_ref    |\n|------------------------------------|-----------------|\n\
      | critical OR architecture           | standard-opus   |\n| docs OR monitoring\
      \ OR low          | quick-fix       |\n| everything else                    |\
      \ standard        |\n\nCall ao.queue.enqueue with task_id and the chosen workflow_ref.\n\
      Then emit phase decision with verdict \"advance\".\n\nRULES:\n- Check ao.queue.list\
      \ before dispatching \u2014 do NOT enqueue duplicates.\n- Be thorough in validation\
      \ \u2014 search the actual code, not just task titles.\n- Use \"advance\" verdict\
      \ after successful dispatch, \"skip\" for invalid/done/duplicate tasks.\n"
    model: claude-haiku-4-5
    tool: claude
    mcp_servers:
    - ao
    skills:
    - queue-management
  work-planner:
    system_prompt: "You are the AO work dispatcher. Feed ready tasks into the triage\
      \ pipeline.\nYou do NOT route to implementation workflows \u2014 triage handles\
      \ that.\nYou do NOT handle rework or rebase \u2014 pr-reviewer handles those.\n\
      \nOn each run:\n1. Call ao.queue.list \u2014 check current queue depth.\n2. If\
      \ total (pending + assigned) >= 10, STOP \u2014 do NOT enqueue more.\n3. Call\
      \ ao.task.prioritized to get highest priority ready tasks.\n4. For each candidate,\
      \ call ao.task.get to check dependencies.\n   - If blocked_by dependencies are\
      \ NOT all \"done\"/\"cancelled\", SKIP.\n5. For eligible tasks NOT already in\
      \ the queue:\n   - Call ao.queue.enqueue with task_id and workflow_ref=\"triage\"\
      \n6. Enqueue up to 3 new tasks per run.\n7. Use ao.queue.reorder to keep queue\
      \ sorted by priority (critical first).\n\nRULES:\n- ALWAYS use workflow_ref=\"\
      triage\" \u2014 never route directly to implementation.\n- NEVER enqueue rework,\
      \ rebase-and-retry, or release-manager workflows.\n- Skip paused, cancelled,\
      \ done, or blocked tasks.\n- Skip tasks with consecutive_dispatch_failures >\
      \ 5.\n- Check ao.workflow.list \u2014 if last workflow had a \"skip\" decision,\
      \ do NOT re-enqueue.\n- Prefer tasks that have NEVER been dispatched over retries.\n\
      - Do NOT enqueue duplicates \u2014 check queue first.\n"
    model: claude-haiku-4-5
    tool: claude
    mcp_servers:
    - ao
    skills:
    - queue-management
  reconciler:
    system_prompt: "You are the AO task reconciler. Unblock the pipeline and clean\
      \ up stale state.\nRESPECT DEPENDENCY ORDER.\n\nOn each run you MUST do ALL\
      \ of these:\n\n1. DETECT SKIPPED/CANCELLED WORKFLOWS:\n   Call ao.workflow.list\
      \ with limit 20. For workflows with status \"cancelled\":\n   - If decision_history\
      \ has a \"skip\" decision, set the task to \"done\".\n\n2. DETECT FAILED WORKFLOWS:\n\
      \   For workflows with status \"failed\" OR \"escalated\":\n   - \"no changes\
      \ were detected\" \u2192 task might already be done, set to \"blocked\".\n  \
      \ - \"failed to connect runner\" \u2192 transient, set task back to \"ready\"\
      \ for retry.\n   - If a task has failed > 5 times, cancel it.\n\n3. UNBLOCK\
      \ TASKS (dependency-aware):\n   Call ao.task.list with status \"blocked\". For\
      \ each:\n   - If ALL blocked_by dependencies are \"done\"/\"cancelled\", set\
      \ to \"ready\".\n   - If blocked_reason is \"Blocked by status update\", set\
      \ to \"ready\" for retry.\n   - If task has a merged PR, set to \"done\".\n\n\
      4. CLEAN STALE QUEUE ENTRIES:\n   Call ao.queue.list. For \"assigned\" entries\
      \ older than 30 minutes, call ao.queue.drop.\n\n5. MARK DONE:\n   For tasks\
      \ with merged PRs (`gh pr list --state merged --head ao/task-XXX`), set to \"\
      done\".\n\n6. PROMOTE BACKLOG (dependency-aware):\n   Call ao.task.list with\
      \ status \"backlog\". Promote to \"ready\" if all blocked_by deps are done.\n\
      \n7. CANCEL STALE TASKS:\n   For \"ready\" tasks re-enqueued > 5 times without\
      \ producing a PR, cancel them.\n\nDEPENDENCY RULES:\n- Never promote/unblock\
      \ if blocked_by deps aren't done.\n- Process leaf tasks first.\n"
    model: claude-haiku-4-5
    tool: claude
    mcp_servers:
    - ao
  sonnet-reviewer:
    system_prompt: "You are a code reviewer. Your primary job is to verify that the\
      \ implementation meets ALL acceptance criteria and requirements from the task.\n\
      \nPROCESS:\n1. Read the task via ao.task.get \u2014 understand requirements and\
      \ acceptance criteria.\n2. Review code changes against EACH acceptance criterion.\n\
      3. Check for: requirement gaps, defects, edge cases, security issues, code quality.\n\
      4. ONLY advance if ALL acceptance criteria are satisfied and code is production-ready.\n\
      5. If requirements are NOT met, set verdict to \"rework\" with:\n   - Which specific\
      \ requirements are unmet\n   - Exact spec of what must be fixed\n   - Update\
      \ task checklist via ao.task.checklist-update\n\nRULES:\n- Do NOT make code changes\
      \ yourself.\n- Every review MUST verify acceptance criteria \u2014 not just code\
      \ quality.\n- Be specific in rework feedback \u2014 the implementation agent\
      \ reads your notes.\n"
    model: claude-sonnet-4-6
    tool: claude
    mcp_servers:
    - ao
phase_catalog:
  triage:
    label: Triage
    description: Evaluate whether a task is still valid, already done, or obsolete
    category: planning
    tags:
    - triage
    - planning
  refine-requirements:
    label: Refine Requirements
    description: Refine vague task descriptions into well-specified acceptance criteria
    category: planning
    tags:
    - requirements
    - planning
  implementation:
    label: Implementation
    description: Implement production-quality code changes
    category: development
    tags:
    - coding
    - implementation
  code-review:
    label: Code Review
    description: Review implementation against requirements and for defects
    category: review
    tags:
    - review
    - quality
    - requirements
  po-review:
    label: PO Review
    description: Product Owner sign-off on completed work
    category: review
    tags:
    - review
    - sign-off
  testing:
    label: Testing
    description: "Manual testing gate \u2014 human verifies the implementation"
    category: verification
    tags:
    - testing
    - quality
  requirements:
    label: Requirements
    description: Validate and refine task requirements before implementation
    category: planning
    tags:
    - requirements
    - planning
  work-planning:
    label: Work Planning
    description: Scan tasks, check eligibility, and enqueue dispatches for the daemon
    category: planning
    tags:
    - planning
    - dispatch
    - queue
  task-reconciliation:
    label: Task Reconciliation
    description: Detect and fix task state inconsistencies
    category: operations
    tags:
    - reconciliation
    - state-management
  create-pr:
    label: Create PR
    description: Push branch and create GitHub PR after successful implementation
    category: operations
    tags:
    - git
    - pr
    - automation
  cleanup:
    label: Cleanup
    description: Delete build artifacts (target/) to free disk space
    category: operations
    tags:
    - cleanup
    - disk
  pr-review:
    label: PR Review
    description: Scan open PRs and perform code reviews with follow-up queueing
    category: operations
    tags:
    - review
    - quality
    - pr
  requirement-task-generation:
    label: Requirement Task Generation
    description: Create or refine linked tasks for a requirement through typed AO tools
    category: planning
    tags:
    - requirements
    - planning
    - task-generation
  requirement-workflow-bootstrap:
    label: Requirement Workflow Bootstrap
    description: Start task workflows for linked requirement tasks
    category: planning
    tags:
    - requirements
    - planning
    - orchestration
phases:
  triage:
    mode: agent
    agent: triager
    directive: Validate the task (check if done/duplicate/obsolete) and if valid, dispatch
      to the right implementation workflow via ao.queue.enqueue.
    capabilities:
      mutates_state: true
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        skip_reason:
          type: string
          description: When verdict is skip, explain whether the task is already_done,
            duplicate, no_longer_valid, or out_of_scope.
        recommended_task_status:
          type: string
          enum:
          - done
          - cancelled
          description: When verdict is skip, use done for already_done, otherwise cancelled.
  refine-requirements:
    mode: agent
    agent: requirement-refiner
    directive: Refine the current task into implementation-ready scope with concrete
      acceptance criteria, checklist items, relevant code references, and constraints.
    capabilities:
      mutates_state: true
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        refined_scope:
          type: string
          description: Concise summary of the refined task scope and implementation
            boundaries.
        acceptance_criteria_added:
          type: array
          description: Acceptance criteria or checklist items that were added or clarified.
          items:
            type: string
        relevant_files:
          type: array
          description: Repository files or modules the implementation phase should
            inspect or edit.
          items:
            type: string
  implementation:
    mode: agent
    agent: default
    directive: Implement production-quality code for this task. Keep changes focused
      and executable.
    output_contract:
      kind: implementation_result
      required_fields:
      - commit_message
      fields:
        summary:
          type: string
          description: Short summary of the completed implementation work.
        changed_files:
          type: array
          description: Files changed by the implementation phase.
          items:
            type: string
        validation_commands:
          type: array
          description: Commands the implementation phase ran to validate the change.
          items:
            type: string
    decision_contract:
      required_evidence:
      - files_modified
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        residual_risks:
          type: array
          description: Known risks or follow-up concerns that remain after implementation.
          items:
            type: string
  code-review:
    mode: agent
    agent: sonnet-reviewer
    directive: Review the implementation against the task's acceptance criteria and
      requirements. Do NOT make changes yourself. If requirements are not fully met
      or issues are found, set verdict to rework with exact details. Only advance if
      ALL acceptance criteria are satisfied and code is production-ready.
    decision_contract:
      required_evidence:
      - code_review_clean
      - requirements_met
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        review_summary:
          type: string
          description: Short review summary explaining why the branch is approved or
            sent back.
        blocking_issues:
          type: array
          description: Concrete blocking defects or unmet requirements discovered.
          items:
            type: string
        requirements_verified:
          type: array
          description: Acceptance criteria confirmed as satisfied.
          items:
            type: string
  po-review:
    mode: agent
    agent: po-reviewer
    directive: Review the delivered work against product intent and acceptance criteria.
      Do not edit code. If gaps remain, set verdict to rework and update the task/checklist
      through AO MCP with precise next actions.
    capabilities:
      mutates_state: true
    decision_contract:
      required_evidence:
      - requirements_met
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        requirements_verified:
          type: array
          description: Acceptance criteria or product requirements confirmed as satisfied.
          items:
            type: string
        unmet_requirements:
          type: array
          description: Acceptance criteria or product requirements still missing or
            only partially satisfied.
          items:
            type: string
        product_summary:
          type: string
          description: Short product-facing assessment of the delivered behavior and
            remaining gaps.
  testing:
    mode: manual
    directive: "Manual testing gate \u2014 human verifies the implementation meets\
      \ requirements."
    manual:
      instructions: Review the implementation changes, run manual tests if needed,
        and approve or reject.
      approval_note_required: false
  work-planning:
    mode: agent
    agent: work-planner
    directive: Scan the task backlog, check eligibility and dependencies, and enqueue
      ready work for the daemon via ao.queue.enqueue.
    capabilities:
      mutates_state: true
  task-reconciliation:
    mode: agent
    agent: reconciler
    directive: 'Detect and fix task state inconsistencies: stale in-progress tasks,
      resolved dependency gates, and completed-but-unmarked tasks.'
    capabilities:
      mutates_state: true
  cleanup:
    mode: command
    directive: Delete cargo build artifacts to free disk space
    command:
      cwd_mode: task_root
      program: cargo
      args:
      - clean
      timeout_secs: 60
  check-commits:
    mode: command
    directive: Verify that the implementation branch has commits beyond its merge-base
    command:
      program: bash
      args:
      - -c
      - 'BASE=$(git merge-base HEAD origin/main 2>/dev/null || git merge-base HEAD
        origin/develop 2>/dev/null || echo HEAD~1); COUNT=$(git rev-list --count "$BASE..HEAD"
        2>/dev/null || echo 0); echo "Commits since base: $COUNT"; [ "$COUNT" -gt
        0 ]'
      cwd_mode: task_root
      timeout_secs: 30
      success_exit_codes:
      - 0
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
  push-branch:
    mode: command
    directive: Push the current branch to origin
    command:
      program: git
      args:
      - push
      - -u
      - origin
      - HEAD
      cwd_mode: task_root
      timeout_secs: 60
      success_exit_codes:
      - 0
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
  create-pr:
    mode: command
    directive: Create a GitHub PR from the current branch to develop
    command:
      program: gh
      args:
      - pr
      - create
      - --fill
      - --base
      - develop
      cwd_mode: task_root
      timeout_secs: 60
      success_exit_codes:
      - 0
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
  force-push:
    mode: command
    directive: Force push rebased branch
    command:
      program: git
      args:
      - push
      - --force-with-lease
      - origin
      - HEAD
      cwd_mode: task_root
      timeout_secs: 60
      success_exit_codes:
      - 0
      - 1
      - 128
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
  sync-main:
    mode: command
    directive: Pull latest origin/main into project root
    command:
      program: git
      args:
      - pull
      - origin
      - main
      - --ff-only
      timeout_secs: 30
      success_exit_codes:
      - 0
      - 1
      - 128
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
  rebase-on-main:
    mode: agent
    agent: default
    directive: "This branch has merge conflicts with its base branch. Rebase it.\n\
      The base branch is provided in dispatch_input as \"base\" (e.g. \"develop\" or\
      \ \"main\").\nIf no base is provided, default to \"develop\".\n1. Run: git fetch\
      \ origin {{base}}\n2. Run: git rebase origin/{{base}}\n3. For each conflict,\
      \ resolve by keeping BOTH sides of changes.\n   For Cargo.lock: accept theirs,\
      \ run cargo build to regenerate.\n   For code files: integrate both changes.\n\
      4. After resolving: git add <file>, then git rebase --continue\n5. Run cargo\
      \ build to verify the project compiles.\n6. If fundamentally incompatible, abort\
      \ with git rebase --abort.\n"
    capabilities:
      mutates_state: true
  address-review:
    mode: agent
    agent: default
    directive: "A PR reviewer has requested changes. Address the feedback.\n\n1. Get\
      \ the task ID from context. Read task via ao.task.get.\n\n2. Find the PR: gh\
      \ pr list --state open --head <branch> --json number\n\n3. Read review comments:\
      \ gh pr view <number> --json reviews,comments\n\n4. For each requested change,\
      \ make the code fix.\n\n5. After all changes: git add -A && git commit referencing\
      \ the review.\n\n6. Verify cargo build passes.\n"
    capabilities:
      mutates_state: true
  unit-test:
    mode: command
    directive: Verify the workspace compiles cleanly
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
          description: Process exit code returned by the build command.
        failure_summary:
          type: string
          description: High-level summary of the build failure when verdict is rework.
        suggested_fix_focus:
          type: string
          description: Short summary of what the next repair loop should focus on.
    command:
      cwd_mode: task_root
      program: cargo
      args:
      - build
      - --workspace
      timeout_secs: 600
      success_exit_codes:
      - 0
  lint:
    mode: command
    directive: Run clippy warnings check
    output_contract:
      kind: phase_result
      fields:
        exit_code:
          type: integer
          description: Process exit code returned by the lint command.
        failure_summary:
          type: string
          description: High-level summary of the lint failure when verdict is rework.
        suggested_fix_focus:
          type: string
          description: Short summary of what the next repair loop should focus on.
    command:
      cwd_mode: task_root
      program: cargo
      args:
      - check
      - --workspace
      success_exit_codes:
      - 0
      timeout_secs: 120
workflows:
- id: triage
  name: Triage & Dispatch
  description: Validate task, check if done/duplicate, dispatch to the right implementation
    workflow
  phases:
  - triage
- id: refine
  name: Refine Requirements
  description: Single-phase workflow that refines task descriptions into implementation-ready
    specs
  phases:
  - refine-requirements
- id: standard
  name: Standard
  description: "Kimi implementation \u2192 Push \u2192 PR. Review via pr-sweep cron."
  phases:
  - requirements
  - implementation:
      skip_if:
      - task_type == docs
  - check-commits
  - push-branch
  - create-pr
  - cleanup
  post_success:
    merge:
      strategy: squash
      target_branch: develop
      create_pr: true
      auto_merge: true
      cleanup_worktree: true
- id: quick-fix
  name: Quick Fix
  description: "Implement \u2192 Push \u2192 PR fast (no requirements phase)"
  phases:
  - implementation
  - check-commits
  - push-branch
  - create-pr
  - cleanup
  post_success:
    merge:
      strategy: squash
      target_branch: develop
      create_pr: true
      auto_merge: true
      cleanup_worktree: true
- id: full
  name: Full Lifecycle
  description: "Triage \u2192 Refine \u2192 Implement \u2192 Push \u2192 PR"
  phases:
  - triage
  - refine-requirements
  - implementation
  - check-commits
  - push-branch
  - create-pr
  - cleanup
  post_success:
    merge:
      strategy: squash
      target_branch: develop
      create_pr: true
      auto_merge: true
      cleanup_worktree: true
- id: rework
  name: Rework
  description: Address reviewer feedback, push fixes
  phases:
  - address-review
  - force-push
- id: rebase-and-retry
  name: Rebase and Retry
  description: Rebase conflicting branch on develop, force push
  phases:
  - rebase-on-main
  - force-push
- id: sync-main
  name: Sync Main
  description: Pull latest origin/main into project root
  phases:
  - sync-main
- id: hotfix
  name: Hotfix
  description: "Emergency fix \u2192 Push \u2192 PR targeting main"
  phases:
  - implementation
  - check-commits
  - push-branch
  - create-pr
  post_success:
    merge:
      strategy: squash
      target_branch: main
      create_pr: true
      auto_merge: false
      cleanup_worktree: true
- id: requirement-task-generation
  name: Requirement Task Generation
  description: Create or refine requirement-linked AO tasks through typed mutation
    tools
  phases:
  - requirement-task-generation
- id: requirement-task-generation-run
  name: Requirement Task Generation + Workflow Start
  description: Create or refine requirement-linked tasks, then start workflows for
    the eligible linked tasks
  phases:
  - requirement-task-generation
  - requirement-workflow-bootstrap
