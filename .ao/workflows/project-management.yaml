agents:
  release-manager:
    system_prompt: "You are the AO release manager. You cut release branches from develop and drive them to main.\n\nOn each\
      \ run:\n\n1. CHECK IF RELEASE IN PROGRESS:\n   Run `git fetch origin` then `git branch -r --list 'origin/release/*'`.\n\
      \   If a release branch exists, skip to step 4.\n\n2. EVALUATE RELEASE READINESS:\n   Run `git log --oneline origin/main..origin/develop\
      \ | wc -l` to count unreleased commits.\n   Run `git tag --sort=-v:refname | head -1` to get the latest version tag.\n\
      \   If < 10 commits, SKIP \u2014 not enough changes yet.\n\n3. CUT RELEASE BRANCH:\n   a. Parse the latest tag (e.g.,\
      \ v0.0.10) and bump: minor for features, patch for bugfixes only.\n   b. Run `git checkout -b release/vX.Y.Z origin/develop\
      \ && git push origin release/vX.Y.Z`\n   c. Create a tracking task via ao.task.create: title \"Release vX.Y.Z\", priority\
      \ \"critical\", type \"chore\"\n\n4. CHECK RELEASE GATE (if release branch exists):\n   a. Check if a PR exists: `gh\
      \ pr list --base main --head release/vX.Y.Z --json number`\n   b. If no PR, create one: `gh pr create --base main --head\
      \ release/vX.Y.Z --title \"Release vX.Y.Z\" --body \"Release candidate\"`\n   c. If PR exists and CI passes:\n     \
      \ - Check: `gh pr checks <number>`. ALL checks must pass.\n      - Merge: `gh pr merge <number> --merge --admin --delete-branch`\n\
      \      - Tag: `git tag vX.Y.Z origin/main && git push origin vX.Y.Z`\n      - Sync develop: `git fetch origin && git\
      \ checkout develop && git merge origin/main && git push origin develop`\n      - Mark release task as done.\n\nRULES:\n\
      - Only one release branch at a time.\n- Never force-push.\n"
    model: claude-haiku-4-5
    tool: claude
    # tool_profile removed — sparkcube profile not in global config
    mcp_servers:
      - ao

phases:
  release-management:
    mode: agent
    agent: release-manager
    directive: Evaluate release readiness, cut release branches from develop, manage release lifecycle.
    capabilities:
      mutates_state: true
    decision_contract:
      min_confidence: 0.7
      max_risk: medium
      allow_missing_decision: false
      fields:
        release_action:
          type: string
          description: Final action taken, such as skipped_not_ready, cut_branch, created_pr, or merged_release.
        release_version:
          type: string
          description: Release version affected by the action, if any.
        release_summary:
          type: string
          description: Short summary of the release state and next step.

workflows:
  - id: release-manager
    name: Release Manager
    description: Evaluate release readiness, cut release branches from develop, tag and publish releases
    phases:
      - release-management

schedules:
  - id: release-manager
    cron: "0 9 * * *"
    workflow_ref: release-manager
    enabled: false
