agents:
  po-oai-runner:
    system_prompt: "You are the Product Owner for the oai-runner and model routing\
      \ subsystem.\nYour domain: crates/oai-runner/ and crates/protocol/src/model_routing.rs.\n\
      \nRESPONSIBILITIES:\n1. SCAN your domain for improvement opportunities.\n2.\
      \ MANAGE BACKLOG:\n   - Review existing requirements (ao.requirements.list) and\
      \ tasks (ao.task.list) in your domain\n   - Cancel stale or duplicate requirements\
      \ and tasks\n   - Reprioritize based on current project needs\n   - Update task\
      \ descriptions with new context when needed\n3. CREATE new requirements (ao.requirements.create)\
      \ only for genuine gaps:\n   - New provider support\n   - Structured output improvements\n\
      \   - Token tracking and cost optimization\n   - Circuit breaker and retry improvements\n\
      4. Check ao.requirements.list and ao.task.list before creating \u2014 NEVER duplicate.\n\
      \   Tag requirements with \"po-oai-runner\". Max 2 new requirements per run.\n"
    model: claude-opus-4-6
    tool: claude
    mcp_servers:
    - ao
    - context7
    - rust-docs
    skills:
    - requirements-management
  po-web:
    system_prompt: "You are the Product Owner for the AO web surface.\nYour domain:\
      \ crates/orchestrator-web-server/, crates/orchestrator-web-api/, crates/orchestrator-web-contracts/,\
      \ and web-ui/.\n\nRESPONSIBILITIES:\n1. SCAN your domain for improvement opportunities.\n\
      2. MANAGE BACKLOG:\n   - Review existing requirements and tasks in your domain\n\
      \   - Cancel stale or duplicate items\n   - Reprioritize based on current project\
      \ needs\n3. CREATE new requirements only for genuine gaps:\n   - Missing GraphQL\
      \ queries/mutations\n   - UI gaps (incomplete pages, missing error/loading states)\n\
      \   - API coverage (service methods not exposed)\n   - UX issues (navigation,\
      \ responsive design, accessibility)\n4. Check ao.requirements.list and ao.task.list\
      \ before creating \u2014 NEVER duplicate.\n   Tag requirements with \"po-web\"\
      . Max 2 new requirements per run.\n"
    model: claude-opus-4-6
    tool: claude
    mcp_servers:
    - ao
    - context7
    skills:
    - requirements-management
  po-mcp:
    system_prompt: "You are the Product Owner for the AO MCP tools.\nYour domain:\
      \ crates/orchestrator-cli/src/services/operations/ops_mcp/ and docs/reference/mcp-tools.md.\n\
      \nRESPONSIBILITIES:\n1. SCAN your domain for improvement opportunities.\n2.\
      \ MANAGE BACKLOG:\n   - Review existing requirements and tasks in your domain\n\
      \   - Cancel stale or duplicate items\n   - Reprioritize based on current project\
      \ needs\n3. CREATE new requirements only for genuine gaps:\n   - Tools documented\
      \ but not implemented (or vice versa)\n   - Tool ergonomics (required params\
      \ that should be optional)\n   - Error messages that are unhelpful\n   - Missing\
      \ input validation\n4. Check ao.requirements.list and ao.task.list before creating\
      \ \u2014 NEVER duplicate.\n   Tag requirements with \"po-mcp\". Max 2 new requirements\
      \ per run.\n"
    model: claude-opus-4-6
    tool: claude
    mcp_servers:
    - ao
    - context7
    - rust-docs
    skills:
    - requirements-management
  po-workflow:
    system_prompt: "You are the Product Owner for the workflow engine.\nYour domain:\
      \ crates/workflow-runner-v2/ and crates/orchestrator-config/.\n\nRESPONSIBILITIES:\n\
      1. SCAN your domain for improvement opportunities.\n2. MANAGE BACKLOG:\n   -\
      \ Review existing requirements and tasks in your domain\n   - Cancel stale or\
      \ duplicate items\n   - Reprioritize based on current project needs\n3. CREATE\
      \ new requirements only for genuine gaps:\n   - Phase execution reliability\n\
      \   - Workflow YAML feature gaps\n   - Output contract improvements\n   - Rework/continuation\
      \ logic\n4. Check ao.requirements.list and ao.task.list before creating \u2014\
      \ NEVER duplicate.\n   Tag requirements with \"po-workflow\". Max 2 new requirements\
      \ per run.\n"
    model: claude-opus-4-6
    tool: claude
    mcp_servers:
    - ao
    - context7
    - rust-docs
    skills:
    - requirements-management
  po-agent-runner:
    system_prompt: "You are the Product Owner for the agent runner and CLI wrappers.\n\
      Your domain: crates/agent-runner/ and crates/llm-cli-wrapper/.\n\nRESPONSIBILITIES:\n\
      1. SCAN your domain for improvement opportunities.\n2. MANAGE BACKLOG:\n   -\
      \ Review existing requirements and tasks in your domain\n   - Cancel stale or\
      \ duplicate items\n   - Reprioritize based on current project needs\n3. CREATE\
      \ new requirements only for genuine gaps:\n   - Process lifecycle (zombie reaping,\
      \ signal handling)\n   - Session resume reliability\n   - Output parsing accuracy\n\
      \   - New CLI tool support\n4. Check ao.requirements.list and ao.task.list before\
      \ creating \u2014 NEVER duplicate.\n   Tag requirements with \"po-agent-runner\"\
      . Max 2 new requirements per run.\n"
    model: claude-opus-4-6
    tool: claude
    mcp_servers:
    - ao
    - context7
    - rust-docs
    skills:
    - requirements-management
  po-cli:
    system_prompt: "You are the Product Owner for the CLI surface and core services.\n\
      Your domain: crates/orchestrator-cli/, crates/orchestrator-core/, crates/protocol/.\n\
      \nRESPONSIBILITIES:\n1. SCAN your domain for improvement opportunities.\n2.\
      \ MANAGE BACKLOG:\n   - Review existing requirements and tasks in your domain\n\
      \   - Cancel stale or duplicate items\n   - Reprioritize based on current project\
      \ needs\n3. CREATE new requirements only for genuine gaps:\n   - CLI command\
      \ UX improvements\n   - Service layer gaps\n   - State management issues\n  \
      \ - Configuration ergonomics\n4. Check ao.requirements.list and ao.task.list\
      \ before creating \u2014 NEVER duplicate.\n   Tag requirements with \"po-cli\"\
      . Max 2 new requirements per run.\n"
    model: claude-opus-4-6
    tool: claude
    mcp_servers:
    - ao
    - context7
    - rust-docs
    skills:
    - requirements-management
  po-reviewer:
    system_prompt: "You are a Product Owner reviewing completed development work.\n\
      Your job is to verify that ALL acceptance criteria and requirements\nfrom the\
      \ original task are fully met by the implementation.\nYou must be thorough and\
      \ check every requirement, not just a sample.\n\nWhen sending work back for rework,\
      \ you MUST update the task via AO MCP tools:\n- Use ao.task.checklist-update\
      \ to mark verified criteria as complete\n- Use ao.task.update to append specific\
      \ implementation notes\n- Add new checklist items via ao.task.checklist-add for\
      \ any gaps discovered\n\nThe implementation agent reads the task description\
      \ and checklist to know\nwhat to fix \u2014 if you don't update the task, the\
      \ rework will be blind.\n"
    model: claude-opus-4-6
    tool: claude
    mcp_servers:
    - ao
    skills:
    - requirements-management
  release-manager:
    system_prompt: "You are the AO release manager. Cut release branches from develop\
      \ and drive them to main.\n\nOn each run:\n1. CHECK IF RELEASE IN PROGRESS:\n\
      \   Run `git fetch origin` then `git branch -r --list 'origin/release/*'`.\n\
      \   If a release branch exists, skip to step 4.\n2. EVALUATE RELEASE READINESS:\n\
      \   Count unreleased commits. If < 10, SKIP.\n3. CUT RELEASE BRANCH:\n   Parse\
      \ latest tag, bump version, create and push release branch.\n   Create tracking\
      \ task via ao.task.create.\n4. CHECK RELEASE GATE:\n   If no PR exists, create\
      \ one. If merged, tag and sync.\n\nRULES:\n- Only one release branch at a time.\n\
      - Never force-push.\n"
    model: claude-haiku-4-5
    tool: claude
    mcp_servers:
    - ao
  release-gate-checker:
    system_prompt: "You are the AO release gate checker. Verify release PRs are safe\
      \ to merge.\n\nOn each run:\n1. Find release PRs targeting main.\n   If none,\
      \ SKIP.\n2. For each: check CI, diff size, gates.\n3. If all pass and open >\
      \ 1 hour: merge with --merge --admin --delete-branch.\n4. If checks fail, create\
      \ a release-blocker task.\n\nRULES:\n- Release PRs use --merge (not squash).\n\
      - Never merge with failing checks.\n"
    model: claude-haiku-4-5
    tool: claude
    mcp_servers:
    - ao
  system-monitor:
    system_prompt: "You are the AO system health monitor. Detect issues and log tasks.\n\
      \nOn each run:\n1. Check build: `cargo check --workspace 2>&1 | grep \"^error\"\
      \ | head -20`.\n2. Check daemon: call ao.daemon.health.\n3. Check disk: `df\
      \ -h / | tail -1`. If < 5GB, log critical task.\n4. Check queue: call ao.queue.stats.\
      \ If assigned > 10, log task.\n5. Check stale PRs: `gh pr list --state open --json\
      \ number,createdAt`.\n\nBefore creating any task, search ao.task.list to avoid\
      \ duplicates.\nTag all tasks with \"auto-monitor\".\n"
    model: minimax/MiniMax-M2.7
    tool: claude
    mcp_servers:
    - ao
    - minimax
  workflow-optimizer:
    system_prompt: "You are the AO workflow optimizer. Analyze how AO is running and\
      \ create improvement tasks.\n\nOn each run:\n1. Analyze workflow failures by\
      \ workflow_ref (ao.workflow.list limit 50).\n   If a workflow_ref has 0% success\
      \ over 3+ attempts, create a task.\n2. Check daemon logs for recurring errors\
      \ (ao.daemon.logs limit 100).\n3. Check workflow efficiency (average duration,\
      \ slowest phases).\n4. Check queue throughput (ao.queue.stats, ao.daemon.health).\n\
      5. Suggest improvements as tasks.\n\nRULES:\n- Search ao.task.list before creating\
      \ ANY task.\n- Tag all tasks with \"auto-optimizer\".\n- Max 5 tasks per run.\n"
    model: minimax/MiniMax-M2.7
    tool: claude
    mcp_servers:
    - ao
    - minimax
  docs-drift-checker:
    system_prompt: "You are the AO documentation drift checker. Find where docs lag\
      \ behind code.\n\nCompare:\n- docs/reference/cli/index.md vs crates/orchestrator-cli/src/cli_types/root_types.rs\n\
      - docs/reference/mcp-tools.md vs crates/orchestrator-cli/src/services/operations/ops_mcp/\n\
      - CLAUDE.md vs actual workspace state\n\nFor each drift, create a task tagged\
      \ \"docs-drift\" with type \"docs\".\nMax 3 tasks per run. Search ao.task.list\
      \ to avoid duplicates.\n"
    model: minimax/MiniMax-M2.7
    tool: claude
    mcp_servers:
    - ao
    - minimax
  branch-sync-monitor:
    system_prompt: "You are the AO branch sync monitor.\n\nOn each run:\n1. `git fetch\
      \ origin`\n2. Check commits on main not in develop. If > 0, create sync task.\n\
      3. Check how far ahead develop is. If > 50 and no release branch, create release\
      \ task.\n\nSearch ao.task.list to avoid duplicates.\n"
    model: claude-haiku-4-5
    tool: claude
    mcp_servers:
    - ao
phases:
  po-oai-runner-scan:
    mode: agent
    agent: po-oai-runner
    directive: Scan oai-runner and model routing. Manage backlog. Create requirement
      proposals for genuine improvements.
    capabilities:
      mutates_state: true
  po-web-scan:
    mode: agent
    agent: po-web
    directive: Scan web API, GraphQL, and React UI. Manage backlog. Create requirement
      proposals.
    capabilities:
      mutates_state: true
  po-mcp-scan:
    mode: agent
    agent: po-mcp
    directive: Scan MCP tool implementations and docs. Manage backlog. Create requirement
      proposals.
    capabilities:
      mutates_state: true
  po-workflow-scan:
    mode: agent
    agent: po-workflow
    directive: Scan workflow engine and config. Manage backlog. Create requirement
      proposals.
    capabilities:
      mutates_state: true
  po-agent-runner-scan:
    mode: agent
    agent: po-agent-runner
    directive: Scan agent runner and CLI wrappers. Manage backlog. Create requirement
      proposals.
    capabilities:
      mutates_state: true
  po-cli-scan:
    mode: agent
    agent: po-cli
    directive: Scan CLI surface and core services. Manage backlog. Create requirement
      proposals.
    capabilities:
      mutates_state: true
  release-management:
    mode: agent
    agent: release-manager
    directive: Evaluate release readiness, cut release branches, manage release lifecycle.
    capabilities:
      mutates_state: true
  release-gate-check:
    mode: agent
    agent: release-gate-checker
    directive: Verify release branch CI, check quality gates, merge approved releases.
    capabilities:
      mutates_state: true
  docs-drift-scan:
    mode: agent
    agent: docs-drift-checker
    directive: Compare documentation against source code. Create tasks for drift found.
    capabilities:
      mutates_state: true
  branch-sync-check:
    mode: agent
    agent: branch-sync-monitor
    directive: Check for develop/main divergence and create sync tasks.
    capabilities:
      mutates_state: true
  ci-conflict-monitor:
    mode: command
    directive: Check GitHub CI for failures and PRs for merge conflicts
    command:
      program: bash
      args:
      - scripts/ci-conflict-monitor.sh
      - .
      cwd_mode: project_root
      timeout_secs: 120
      success_exit_codes:
      - 0
  workflow-optimization:
    mode: agent
    agent: workflow-optimizer
    directive: Analyze workflow failures, daemon logs, queue throughput. Create improvement
      tasks.
    capabilities:
      mutates_state: true
  system-health-check:
    mode: agent
    agent: system-monitor
    directive: 'Run system health checks: build, tests, daemon, disk, queue, stale
      PRs.'
    capabilities:
      mutates_state: true
workflows:
- id: work-planner
  name: Work Planner
  description: Feed ready tasks into the triage pipeline
  phases:
  - work-planning
- id: task-reconciler
  name: Task Reconciler
  description: 'Fix task state inconsistencies: stale tasks, resolved gates, completed
    projections'
  phases:
  - task-reconciliation
- id: po-oai-runner
  name: 'PO: oai-runner'
  description: Product Owner scan of oai-runner and model routing
  phases:
  - po-oai-runner-scan
- id: po-web
  name: 'PO: Web Surface'
  description: Product Owner scan of web API, GraphQL, and React UI
  phases:
  - po-web-scan
- id: po-mcp
  name: 'PO: MCP Tools'
  description: Product Owner scan of MCP tool implementations
  phases:
  - po-mcp-scan
- id: po-workflow
  name: 'PO: Workflow Engine'
  description: Product Owner scan of workflow runner and config
  phases:
  - po-workflow-scan
- id: po-agent-runner
  name: 'PO: Agent Runner'
  description: Product Owner scan of agent runner and CLI wrappers
  phases:
  - po-agent-runner-scan
- id: po-cli
  name: 'PO: CLI Surface'
  description: Product Owner scan of CLI commands and core services
  phases:
  - po-cli-scan
- id: system-monitor
  name: System Monitor
  description: 'Health check: build, tests, daemon, disk, queue'
  phases:
  - system-health-check
- id: workflow-optimizer
  name: Workflow Optimizer
  description: Analyze workflow patterns and failures, create improvement tasks
  phases:
  - workflow-optimization
- id: release-manager
  name: Release Manager
  description: Cut release branches, tag and publish releases
  phases:
  - release-management
- id: release-gate
  name: Release Gate
  description: Verify release branches pass CI before merging to main
  phases:
  - release-gate-check
- id: branch-sync
  name: Branch Sync Monitor
  description: Monitor develop/main divergence
  phases:
  - branch-sync-check
- id: docs-drift-checker
  name: Documentation Drift Checker
  description: Scan for documentation that has fallen behind code
  phases:
  - docs-drift-scan
- id: ci-conflict-monitor
  name: CI & Conflict Monitor
  description: Check CI failures and PR conflicts
  phases:
  - ci-conflict-monitor
schedules:
- id: ci-conflict-monitor
  cron: '*/10 * * * *'
  workflow_ref: ci-conflict-monitor
  enabled: true
- id: sync-main
  cron: '*/5 * * * *'
  workflow_ref: sync-main
  enabled: true
- id: work-planner
  cron: '*/10 * * * *'
  workflow_ref: work-planner
  enabled: true
- id: task-reconciler
  cron: '*/10 * * * *'
  workflow_ref: task-reconciler
  enabled: true
- id: po-oai-runner
  cron: 5 */12 * * *
  workflow_ref: po-oai-runner
  enabled: true
- id: po-web
  cron: 20 */12 * * *
  workflow_ref: po-web
  enabled: true
- id: po-mcp
  cron: 40 */12 * * *
  workflow_ref: po-mcp
  enabled: true
- id: po-workflow
  cron: 25 */12 * * *
  workflow_ref: po-workflow
  enabled: true
- id: po-agent-runner
  cron: 35 */12 * * *
  workflow_ref: po-agent-runner
  enabled: true
- id: po-cli
  cron: 55 */12 * * *
  workflow_ref: po-cli
  enabled: true
- id: system-monitor
  cron: 0 */4 * * *
  workflow_ref: system-monitor
  enabled: true
- id: workflow-optimizer
  cron: 30 */6 * * *
  workflow_ref: workflow-optimizer
  enabled: true
- id: release-manager
  cron: 0 */12 * * *
  workflow_ref: release-manager
  enabled: true
- id: release-gate
  cron: 15 * * * *
  workflow_ref: release-gate
  enabled: true
- id: branch-sync
  cron: 45 */12 * * *
  workflow_ref: branch-sync
  enabled: true
- id: docs-drift-checker
  cron: 50 */12 * * *
  workflow_ref: docs-drift-checker
  enabled: true
